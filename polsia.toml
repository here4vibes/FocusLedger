[[crons]]
name = "routine-nudge-check"
schedule = "*/15 * * * *"
command = "node jobs/routineNudgeCheck.js"

[[crons]]
name = "followup-email-check"
schedule = "*/15 * * * *"
command = "node jobs/followupEmailCheck.js"

[[crons]]
name = "impulse-spending-check"
schedule = "*/15 * * * *"
command = "node jobs/impulseSpendingCheck.js"

[[crons]]
name = "plaid-daily-sync"
schedule = "0 6 * * *"
command = "node jobs/plaid-sync.js"

[[crons]]
name = "evening-checkin-sender"
schedule = "0 20 * * *"
command = "node jobs/evening-checkin.js"

[[crons]]
name = "movement-break-check"
schedule = "*/15 * * * *"
command = "node jobs/movementBreakCheck.js"

[[crons]]
name = "pattern-detection"
schedule = "0 3 * * 0"
command = "node jobs/patternDetectionJob.js"

[[crons]]
name = "cold-start-nudge"
schedule = "0 9 * * *"
command = "node jobs/coldStartNudge.js"
