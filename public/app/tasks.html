<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Tasks — FocusLedger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/app-layout.css">
    <style>
        /* ── Design tokens (mirrors app.html) ───────────────────────────── */
        :root {
            --orange: #c9a84c;
            --orange-light: #d4b56a;
            --navy: #011e5c;
            --cream: #faf9f7;
            --warm-white: #fafaf8;
            --text-dark: #1a1a1a;
            --text-muted: #6b6b6b;
            --green: #5BA4A4;
            --green-muted: #4A9292;
            --border: #e8e5e0;
            --nav-height: 60px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            background: var(--cream);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── Header bar ──────────────────────────────────────────────────── */
        .page-header {
            background: var(--navy);
            padding: 0.85rem 1.25rem;
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
        }
        .page-header-left { display: flex; align-items: center; gap: 0.75rem; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; color: white; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo-img { height: 26px; width: auto; display: block; flex-shrink: 0; }
        .back-btn { font-size: 0.82rem; color: rgba(255,255,255,0.72); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; transition: color 0.2s; }
        .back-btn:hover { color: white; }
        .page-header-right { display: flex; align-items: center; gap: 0.5rem; }
        .pro-badge { background: var(--orange); color: #1a1a1a; font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.05em; display: none; }
        .pro-badge.visible { display: inline; }
        .logout-btn { font-size: 0.82rem; color: rgba(255,255,255,0.75); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 0.35rem 0.5rem; border-radius: 6px; transition: color 0.2s, background 0.2s; }
        .logout-btn:hover { color: white; background: rgba(255,255,255,0.08); }

        /* ── Main content ───────────────────────────────────────────────── */
        .page-content {
            max-width: 720px;
            margin: 0 auto;
            padding: 1.25rem 1rem 2rem;
        }

        /* ── Summary bar ───────────────────────────────────────────────── */
        .summary-bar {
            display: flex; gap: 0.5rem; flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }
        .summary-pill {
            background: var(--warm-white);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.78rem; font-weight: 500;
            padding: 0.3rem 0.75rem; border-radius: 50px;
        }
        .summary-pill strong { color: var(--navy); }

        /* ── Add task form ──────────────────────────────────────────────── */
        .add-task-card {
            background: white;
            border-radius: 14px;
            padding: 1rem 1rem 0.75rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(45,42,38,0.06);
        }
        .add-task-row { display: flex; gap: 0.5rem; }
        .add-task-input {
            flex: 1; padding: 0.7rem 1rem;
            border: 2px solid var(--border); border-radius: 10px;
            font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
            color: var(--text-dark); background: white; outline: none; transition: border-color 0.2s;
        }
        .add-task-input:focus { border-color: var(--orange-light); }
        .add-task-input::placeholder { color: #B0ADA8; }
        .btn-add {
            background: var(--orange); color: white; border: none;
            padding: 0.7rem 1.1rem; border-radius: 10px;
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; white-space: nowrap;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-add:hover { background: var(--orange-light); }
        .btn-add:active { transform: scale(0.97); }

        /* Breakdown toggle */
        .breakdown-toggle {
            display: flex; align-items: center; gap: 0.5rem;
            margin-top: 0.75rem; cursor: pointer; user-select: none;
        }
        .toggle-track {
            width: 34px; height: 19px; background: #D8D5D0;
            border-radius: 10px; position: relative; transition: background 0.2s;
        }
        .toggle-track.on { background: var(--green); }
        .toggle-knob {
            width: 15px; height: 15px; background: white; border-radius: 50%;
            position: absolute; top: 2px; left: 2px; transition: left 0.2s;
        }
        .toggle-track.on .toggle-knob { left: 17px; }
        .breakdown-toggle span { font-size: 0.8rem; color: var(--text-muted); }

        /* Steps input area */
        .steps-input-area {
            display: none; margin-top: 0.75rem;
            padding: 0.75rem; background: var(--cream);
            border-radius: 10px; border: 1px dashed #D8D5D0;
        }
        .steps-input-area.visible { display: block; }
        .steps-input-area label { font-size: 0.78rem; color: var(--text-muted); display: block; margin-bottom: 0.5rem; }
        .step-inputs { display: flex; flex-direction: column; gap: 0.35rem; }
        .step-row { display: flex; gap: 0.35rem; align-items: center; }
        .step-row input {
            flex: 1; padding: 0.45rem 0.7rem; border: 1.5px solid #D8D5D0;
            border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
            background: white; outline: none;
        }
        .step-row input:focus { border-color: var(--green); }
        .btn-remove-step {
            width: 22px; height: 22px; background: none; border: none;
            color: #B0ADA8; cursor: pointer; font-size: 1rem;
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            transition: color 0.15s;
        }
        .btn-remove-step:hover { color: var(--orange); }
        .btn-add-step {
            margin-top: 0.4rem; background: none;
            border: 1.5px dashed #D0CCC8; padding: 0.35rem 0.65rem;
            border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
            color: var(--text-muted); cursor: pointer; transition: border-color 0.2s, color 0.2s;
        }
        .btn-add-step:hover { border-color: var(--green); color: var(--green-muted); }

        /* AI loading for step suggestions */
        .step-loading {
            display: none; font-size: 0.78rem; color: var(--text-muted);
            margin-top: 0.5rem; align-items: center; gap: 0.4rem;
        }
        .step-loading.visible { display: flex; }
        .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Filters row ────────────────────────────────────────────────── */
        .filters-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
        .filter-tabs { display: flex; gap: 0.2rem; background: white; border: 1px solid var(--border); border-radius: 10px; padding: 0.2rem; }
        .filter-tab {
            padding: 0.4rem 0.75rem; border: none; background: none;
            border-radius: 8px; font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem; font-weight: 500; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s;
        }
        .filter-tab.active { background: var(--navy); color: white; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .filter-tab:hover:not(.active) { color: var(--navy); }
        .sort-btn {
            padding: 0.4rem 0.75rem; border: 1.5px solid var(--border);
            background: white; border-radius: 8px; font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem; font-weight: 500; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s; margin-left: auto;
        }
        .sort-btn.active { border-color: var(--navy); color: var(--navy); background: rgba(1,30,92,0.04); }
        .sort-btn:hover:not(.active) { border-color: var(--orange); color: var(--orange); }

        /* ── Task list ───────────────────────────────────────────────────── */
        #taskList { display: flex; flex-direction: column; gap: 0.3rem; }

        .task-card {
            background: var(--warm-white);
            border-radius: 10px; padding: 0.6rem 0.75rem;
            display: flex; flex-direction: row; align-items: center; gap: 0.6rem;
            min-height: 52px;
            border: 1px solid rgba(0,0,0,0.04);
            transition: box-shadow 0.2s, border-color 0.15s;
        }
        .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.08); }
        .task-card.completed-task { opacity: 0.5; }

        .task-checkbox {
            width: 20px; height: 20px; border-radius: 5px; border: 2px solid #DDD;
            flex-shrink: 0; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; background: white;
            font-size: 0.65rem; color: white;
        }
        .task-checkbox:hover { border-color: var(--green); }
        .task-checkbox.done { background: var(--green); border-color: var(--green); animation: checkPop 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        @keyframes checkPop {
            0%   { transform: scale(1);    border-radius: 5px; }
            20%  { transform: scale(0.65); border-radius: 5px; }
            60%  { transform: scale(1.35); border-radius: 10px; }
            80%  { transform: scale(0.95); border-radius: 10px; }
            100% { transform: scale(1);    border-radius: 10px; }
        }

        /* Ripple ring expanding from checkbox on complete */
        @keyframes checkRipple {
            0%   { transform: scale(0.5); opacity: 0.7; }
            100% { transform: scale(2.4); opacity: 0; }
        }
        .task-checkbox.done::after {
            content: ''; position: absolute; inset: -2px;
            border-radius: 8px; border: 2px solid var(--green);
            animation: checkRipple 0.5s ease-out forwards;
            pointer-events: none;
        }
        .task-checkbox { position: relative; overflow: visible; }

        /* Card completing flash */
        @keyframes cardComplete {
            0%   { background: var(--warm-white); box-shadow: none; }
            35%  { background: rgba(91,164,164,0.14); box-shadow: 0 0 0 2px rgba(91,164,164,0.35); }
            100% { background: var(--warm-white); box-shadow: none; }
        }
        .task-card.completing { animation: cardComplete 0.55s ease forwards; }

        /* Particle burst */
        @keyframes particleFly {
            0%   { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .task-complete-particle {
            position: fixed; width: 6px; height: 6px; border-radius: 50%;
            pointer-events: none; z-index: 9999;
            animation: particleFly 0.55s ease-out forwards;
        }

        /* Float-up "✓ done" label */
        @keyframes floatUp {
            0%   { transform: translateY(0)    scale(1);    opacity: 1; }
            40%  { transform: translateY(-10px) scale(1.05); opacity: 1; }
            100% { transform: translateY(-38px) scale(0.9);  opacity: 0; }
        }
        .task-done-label {
            position: fixed; pointer-events: none; z-index: 9999;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem; font-weight: 700;
            color: var(--green); white-space: nowrap;
            animation: floatUp 0.65s ease-out forwards;
        }
        .task-body { flex: 1; min-width: 0; display: flex; align-items: center; gap: 0.5rem; }
        .task-title {
            font-size: 0.88rem; font-weight: 500; color: var(--text-dark);
            line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; min-width: 0;
        }
        .task-card.completed-task .task-title { text-decoration: line-through; color: var(--text-muted); }
        .task-badges { display: flex; gap: 0.35rem; align-items: center; flex-shrink: 0; flex-wrap: nowrap; }
        .task-value-badge {
            font-size: 0.62rem; font-weight: 600; letter-spacing: 0.02em;
            padding: 2px 7px; border-radius: 20px;
            white-space: nowrap; line-height: 1.3;
            max-width: 80px; overflow: hidden; text-overflow: ellipsis;
        }
        .task-due {
            font-size: 0.68rem; color: var(--text-muted);
            display: flex; align-items: center; gap: 0.2rem;
            white-space: nowrap; flex-shrink: 0;
        }
        .task-due.overdue { color: #E07A5F; font-weight: 600; }
        .task-due.today { color: var(--green); font-weight: 600; }
        .task-steps-badge {
            font-size: 0.62rem; color: var(--text-muted);
            background: var(--cream); padding: 1px 5px; border-radius: 4px;
            white-space: nowrap; flex-shrink: 0;
        }
        .task-steps-badge.done { color: var(--green); background: rgba(91,164,164,0.1); }
        .task-recurrence-icon { font-size: 0.7rem; flex-shrink: 0; }
        .task-actions { display: flex; align-items: center; flex-shrink: 0; }
        .task-actions .icon-btn {
            width: 26px; height: 26px; border-radius: 5px; border: none;
            background: none; color: #C0BDB8; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; transition: background 0.15s, color 0.15s;
        }
        .task-actions .icon-btn:hover { background: var(--cream); color: var(--navy); }

        /* Steps hidden in compact view — only shown in edit modal */
        .task-steps { display: none; }
        .task-step-row {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.82rem; color: var(--text-muted); padding: 0.2rem 0;
        }
        .step-check {
            width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #DDD;
            flex-shrink: 0; cursor: pointer; background: white; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .step-check.done { background: var(--green); border-color: var(--green); }
        .step-check:hover { border-color: var(--green); }
        .step-label { flex: 1; }
        .task-step-row.done .step-label { text-decoration: line-through; color: #B0ADA8; }

        /* ── Completed section ──────────────────────────────────────────── */
        .completed-header {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 0.75rem; margin-top: 0.5rem;
            background: white; border: 1px solid var(--border);
            border-radius: 10px; cursor: pointer; user-select: none;
            transition: background 0.15s;
        }
        .completed-header:hover { background: #F5F3EF; }
        .completed-header .chevron {
            width: 16px; height: 16px; color: var(--text-muted); transition: transform 0.2s;
            flex-shrink: 0;
        }
        .completed-header .chevron.open { transform: rotate(90deg); }
        .completed-label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); flex: 1; }
        .completed-count { font-size: 0.7rem; font-weight: 600; color: var(--green); background: rgba(91,164,164,0.12); border-radius: 20px; padding: 0.1rem 0.5rem; }
        .completed-tasks { display: none; flex-direction: column; gap: 0.35rem; margin-top: 0.5rem; }
        .completed-tasks.visible { display: flex; }

        /* ── Empty state ────────────────────────────────────────────────── */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .empty-state p { font-size: 0.9rem; line-height: 1.5; }

        /* ── AI suggestions ────────────────────────────────────────────── */
        .ai-suggestions-section { margin-top: 1.5rem; }
        .ai-suggestions-section h3 {
            font-size: 0.85rem; font-weight: 700; color: var(--navy);
            margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.4rem;
        }
        .ai-badge {
            font-size: 0.58rem; font-weight: 700; letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--orange), var(--orange-light));
            color: white; padding: 2px 5px; border-radius: 4px;
        }
        .ai-card {
            background: white; border: 1.5px solid var(--border); border-radius: 12px;
            padding: 0.9rem 1rem; margin-bottom: 0.6rem; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .ai-card:hover { border-color: rgba(201,168,76,0.3); box-shadow: 0 3px 12px rgba(0,0,0,0.07); }
        .ai-card-title { font-size: 0.92rem; font-weight: 600; color: var(--navy); margin-bottom: 0.6rem; line-height: 1.4; }
        .ai-steps { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }
        .ai-steps li {
            font-size: 0.8rem; color: var(--text-muted); padding: 0.3rem 0.6rem;
            background: var(--cream); border-radius: 5px; border-left: 3px solid var(--orange); line-height: 1.4;
        }
        .ai-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .ai-btn-add {
            flex: 1; min-height: 40px; padding: 0.5rem 0.75rem; border-radius: 9px;
            font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
            background: var(--orange); color: white; border: none; cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .ai-btn-add:hover { background: var(--orange-light); }
        .ai-btn-add:active { transform: scale(0.97); }
        .ai-btn-dismiss {
            min-height: 40px; padding: 0.5rem 0.75rem; border-radius: 9px;
            font-family: 'DM Sans', sans-serif'; font-size: 0.82rem; font-weight: 500;
            background: transparent; color: var(--text-muted); border: 1.5px solid var(--border);
            cursor: pointer; transition: border-color 0.15s, color 0.15s;
        }
        .ai-btn-dismiss:hover { border-color: #B0ADA8; color: var(--navy); }

        /* AI cap banner */
        .ai-cap-banner {
            background: linear-gradient(135deg, var(--navy) 0%, #02287a 100%);
            color: white; border-radius: 12px; padding: 0.85rem 1rem;
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }
        .ai-cap-text { flex: 1; font-size: 0.82rem; line-height: 1.4; }
        .ai-cap-upgrade {
            background: var(--orange); color: white; border: none;
            padding: 0.4rem 0.85rem; border-radius: 8px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .ai-cap-upgrade:hover { background: var(--orange-light); }

        /* ── Edit modal ────────────────────────────────────────────────── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 500; align-items: center; justify-content: center; padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 1.5rem;
            width: 100%; max-width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .modal-header h3 { font-size: 1rem; color: var(--navy); }
        .modal-close { background: none; border: none; font-size: 1.2rem; color: var(--text-muted); cursor: pointer; padding: 0.25rem; border-radius: 6px; transition: background 0.15s; }
        .modal-close:hover { background: var(--cream); color: var(--navy); }
        .modal-field { margin-bottom: 0.85rem; }
        .modal-field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.06em; }
        .modal-field input, .modal-field textarea {
            width: 100%; padding: 0.65rem 0.85rem; border: 1.5px solid var(--border);
            border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
            background: white; color: var(--text-dark); outline: none; transition: border-color 0.2s;
        }
        .modal-field input:focus, .modal-field textarea:focus { border-color: var(--orange); }
        .modal-field textarea { resize: vertical; min-height: 80px; }
        .modal-field input[type="date"], .modal-field input[type="time"] { cursor: pointer; }
        .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .modal-save {
            flex: 1; min-height: 44px; background: var(--orange); color: white;
            border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: background 0.15s;
        }
        .modal-save:hover { background: var(--orange-light); }
        .modal-delete {
            min-height: 44px; padding: 0.6rem 0.85rem; background: #FEF2F2; color: #E07A5F;
            border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem; font-weight: 500; cursor: pointer;
        }
        .modal-delete:hover { background: #FDE8E4; }
        .modal-cancel {
            min-height: 44px; padding: 0.6rem 0.85rem; background: transparent;
            color: var(--text-muted); border: 1.5px solid var(--border); border-radius: 10px;
            font-family: 'DM Sans', sans-serif'; font-size: 0.85rem; cursor: pointer;
        }
        .modal-cancel:hover { border-color: var(--navy); color: var(--navy); }

        /* ── Toast ──────────────────────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--navy); color: white; padding: 0.65rem 1.25rem; border-radius: 10px;
            font-size: 0.85rem; font-weight: 500; z-index: 9999; opacity: 0;
            transition: opacity 0.3s, transform 0.3s; pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Loading ───────────────────────────────────────────────────── */
        .loading-row { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.85rem; }

        /* ── Upgrade gate ──────────────────────────────────────────────── */
        .upgrade-banner {
            background: linear-gradient(135deg, var(--navy), #02287a);
            color: white; border-radius: 12px; padding: 0.9rem 1.1rem;
            margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
        }
        .upgrade-banner-text { flex: 1; font-size: 0.85rem; line-height: 1.4; }
        .upgrade-btn {
            background: var(--orange); color: #1a1a1a; border: none;
            padding: 0.45rem 0.85rem; border-radius: 8px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap;
        }

        /* ── Mobile bottom bar ─────────────────────────────────────────── */
        .mobile-bottom-bar {
            display: flex; position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--navy); border-top: none; z-index: 200;
            justify-content: space-around; padding: 0.5rem 0;
        }
        @media (min-width: 900px) { .mobile-bottom-bar { display: none; } }
        .bottom-tab {
            display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
            color: rgba(255,255,255,0.55); text-decoration: none;
            font-size: 0.6rem; font-weight: 500; padding: 0.25rem 0.75rem;
            border-radius: 8px; transition: color 0.2s; min-width: 60px;
        }
        .bottom-tab.active { color: var(--orange); }
        .bottom-tab svg { width: 22px; height: 22px; }

        /* ── FAB ───────────────────────────────────────────────────────────── */
        .fab {
            position: fixed; bottom: 78px; right: 20px;
            width: 58px; height: 58px; border-radius: 16px;
            background: var(--orange); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(201,168,76,0.35);
            z-index: 300; transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1.8rem; color: white; line-height: 1;
        }
        .fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(201,168,76,0.45); }
        .fab:active { transform: scale(0.95); }
        @media (min-width: 900px) { .fab { bottom: 28px; right: 28px; } }

        /* ── Quick-add overlay ─────────────────────────────────────────────── */
        .qa-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.35); z-index: 500;
            align-items: flex-end; justify-content: center;
            padding: 0 1rem 2rem;
        }
        @media (min-width: 500px) { .qa-overlay { align-items: center; } }
        .qa-overlay.open { display: flex; }
        .qa-sheet {
            background: white; border-radius: 20px 20px 0 0;
            width: 100%; max-width: 480px; padding: 1.5rem 1.25rem 1.75rem;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
            animation: sheetUp 0.22s ease-out;
        }
        @media (min-width: 500px) {
            .qa-sheet { border-radius: 20px; margin-bottom: 0; }
        }
        @keyframes sheetUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .qa-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .qa-title-row h3 { font-size: 0.95rem; color: var(--navy); }
        .qa-close {
            width: 28px; height: 28px; border-radius: 8px; border: none;
            background: var(--cream); cursor: pointer; font-size: 1.1rem;
            color: var(--text-muted); display: flex; align-items: center; justify-content: center;
        }
        .qa-input-row { display: flex; gap: 0.5rem; align-items: flex-end; margin-bottom: 0.75rem; }
        .qa-input {
            flex: 1; padding: 0.85rem 1rem; border: 2px solid var(--border);
            border-radius: 12px; font-family: 'DM Sans', sans-serif;
            font-size: 1rem; color: var(--text-dark); background: white;
            outline: none; transition: border-color 0.2s;
        }
        .qa-input:focus { border-color: var(--orange); }
        .qa-save {
            padding: 0.85rem 1.25rem; background: var(--orange); border: none;
            border-radius: 12px; font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; font-weight: 600; color: white; cursor: pointer;
            white-space: nowrap; transition: background 0.15s;
        }
        .qa-save:hover { background: var(--orange-light); }
        .qa-save:disabled { opacity: 0.45; cursor: not-allowed; }
        .qa-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; min-height: 32px; }
        .qa-chip {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.3rem 0.75rem; background: var(--cream); border: 1.5px solid var(--border);
            border-radius: 20px; font-size: 0.78rem; font-weight: 500;
            color: var(--navy); cursor: pointer; transition: border-color 0.15s, background 0.15s;
            user-select: none;
        }
        .qa-chip:hover { border-color: var(--orange); background: rgba(201,168,76,0.08); }
        .qa-chip .chip-dot {
            width: 7px; height: 7px; border-radius: 50%; background: var(--green);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="page-header">
        <div class="page-header-left">
            <a href="/app/tasks" class="logo">
                <img src="/icons/fl-icon.svg" class="logo-img" alt="">
                FocusLedger
            </a>
            <span class="pro-badge" id="proBadge">AUTOPILOT</span>
        </div>
        <div class="page-header-right">
            <button class="logout-btn" id="logoutBtn">Sign out</button>
        </div>
    </header>

    <!-- Main -->
    <main class="page-content">
        <!-- Summary -->
        <div class="summary-bar" id="summaryBar">
            <div class="summary-pill" id="pillToday">—</div>
            <div class="summary-pill" id="pillOverdue" style="display:none">— overdue</div>
            <div class="summary-pill" id="pillStreak"></div>
        </div>

        <!-- Upgrade banner (free users at task limit) -->
        <div class="upgrade-banner" id="upgradeBanner" style="display:none">
            <div class="upgrade-banner-text">You've reached the free task limit (10 active). Upgrade to Autopilot for unlimited tasks.</div>
            <button class="upgrade-btn" onclick="location.href='/settings'">Upgrade →</button>
        </div>

        <!-- Add task form -->
        <div class="add-task-card">
            <div class="add-task-row">
                <input type="text" id="taskInput" class="add-task-input" placeholder="What do you need to do?" maxlength="150" autocomplete="off">
                <button class="btn-add" id="addBtn">Add</button>
            </div>
            <div class="breakdown-toggle" id="breakdownToggle">
                <div class="toggle-track" id="breakdownTrack"><div class="toggle-knob"></div></div>
                <span>Break it into steps</span>
            </div>
            <div class="steps-input-area" id="stepsArea">
                <label>Subtasks (AI suggestions shown below)</label>
                <div class="step-inputs" id="stepInputs"></div>
                <button class="btn-add-step" id="addStepBtn">+ Add step</button>
            </div>
            <div class="step-loading" id="stepLoading">
                <div class="spinner"></div>
                <span>Breaking it down…</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-row">
            <div class="filter-tabs" id="filterTabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="active">Active</button>
                <button class="filter-tab" data-filter="completed">Done</button>
            </div>
            <button class="sort-btn" id="sortBtn">Due date</button>
        </div>

        <!-- Task list -->
        <div id="taskList"></div>

        <!-- AI suggestions -->
        <div class="ai-suggestions-section" id="aiSection" style="display:none">
            <h3>AI Suggestions <span class="ai-badge">AUTOPILOT</span></h3>
            <div id="aiSuggestions"></div>
        </div>
    </main>

    <!-- Edit modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit Task</h3>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-field">
                <label>Title</label>
                <input type="text" id="editTitle" maxlength="150" placeholder="What needs to happen?">
            </div>
            <div class="modal-field">
                <label>Due date</label>
                <input type="date" id="editDueDate">
            </div>
            <div class="modal-field">
                <label>Due time (optional)</label>
                <input type="time" id="editDueTime">
            </div>
            <div class="modal-field">
                <label>Notes</label>
                <textarea id="editNotes" placeholder="Any extra details?"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-save" id="modalSave">Save</button>
                <button class="modal-delete" id="modalDelete">Delete</button>
                <button class="modal-cancel" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- FAB -->
    <button class="fab" id="fabBtn" title="Quick add task">+</button>

    <!-- Quick-add modal -->
    <div class="qa-overlay" id="qaOverlay">
        <div class="qa-sheet">
            <div class="qa-title-row">
                <h3>Quick Add</h3>
                <button class="qa-close" id="qaClose">×</button>
            </div>
            <div class="qa-input-row">
                <input type="text" class="qa-input" id="qaInput" placeholder="What needs to get done?" maxlength="150" autocomplete="off">
                <button class="qa-save" id="qaSave" disabled>Add</button>
            </div>
            <div class="qa-chips" id="qaChips"></div>
        </div>
    </div>

    <!-- Mobile bottom nav -->
    <nav class="mobile-bottom-bar" id="mobileNav"></nav>

    <script src="/js/services/values-service.js"></script>
    <script src="/js/date-parser.js"></script>
    <script>
    // ── Auth ──────────────────────────────────────────────────────────────────
    function getToken() { return localStorage.getItem('fl_token'); }
    function getUser() {
        try { const t = getToken(); if (!t) return null; const parts = t.split('.'); return JSON.parse(atob(parts[1])); }
        catch { return null; }
    }
    function api(method, url, body) {
        return fetch(url, {
            method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (getToken() || '') },
            body: body ? JSON.stringify(body) : undefined,
        }).then(r => r.json());
    }

    // ── State ─────────────────────────────────────────────────────────────────
    const state = { filter: 'all', sort: 'default', tasks: [], editingId: null, breakdownOn: false, isPro: false, valuesMap: null };

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── Load tasks ─────────────────────────────────────────────────────────────
    async function fetchTasks() {
        try {
            const params = new URLSearchParams();
            if (state.filter !== 'all') params.set('filter', state.filter);
            if (state.sort === 'due_date') params.set('sort', 'due_date');
            const data = await api('GET', '/api/tasks?' + params.toString());
            if (data.success) {
                const nullTasks = (data.tasks || []).filter(t => t.id == null);
                if (nullTasks.length > 0) {
                    showToast('[tasks] ' + nullTasks.length + ' null-ID task(s): "' + nullTasks.map(t => t.title).join('", "').slice(0, 60) + '"');
                }
                state.tasks = data.tasks;
                renderTasks();
            } else {
                showToast('[GET /api/tasks] ' + (data.message || 'unknown error'));
            }
        } catch(e) {
            showToast('[fetch tasks] ' + e.message);
        }
    }

    async function fetchSummary() {
        const [sumData, streakData] = await Promise.all([
            api('GET', '/api/tasks/summary'),
            api('GET', '/api/tasks/streak'),
        ]);
        if (sumData.success) {
            const s = sumData.summary;
            const todayCount = s.today_total || 0;
            document.getElementById('pillToday').innerHTML = `<strong>${todayCount}</strong> tasks today`;
            const overdueEl = document.getElementById('pillOverdue');
            if (parseInt(s.overdue) > 0) {
                overdueEl.textContent = `${s.overdue} overdue`;
                overdueEl.style.display = 'inline';
            } else { overdueEl.style.display = 'none'; }
        }
        if (streakData.success) {
            document.getElementById('pillStreak').innerHTML = `🔥 <strong>${streakData.current_streak}</strong> day streak`;
        }
    }

    function renderTasks() {
        const container = document.getElementById('taskList');
        const activeTasks = state.tasks.filter(t => !t.is_completed);
        const completedTasks = state.tasks.filter(t => t.is_completed);

        // Empty state
        if (state.tasks.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="emoji">🎯</div><p>No tasks yet.<br>Add something above to get started.</p></div>`;
            return;
        }

        // Completed section header (always shown when there are completed tasks)
        const completedHeader = completedTasks.length > 0 ? `
            <div class="completed-header" id="completedHeader">
                <svg class="chevron" id="completedChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
                <span class="completed-label">Completed</span>
                <span class="completed-count">${completedTasks.length}</span>
            </div>
            <div class="completed-tasks" id="completedTasks"></div>
        ` : '';

        // Generate all task cards
        const activeCards = activeTasks.map(t => taskCardHTML(t, false)).join('');
        const completedCards = completedTasks.map(t => taskCardHTML(t, true)).join('');

        container.innerHTML = activeCards + completedHeader;
        if (completedTasks.length > 0) {
            document.getElementById('completedTasks').innerHTML = completedCards;
        }

        // Attach event listeners
        container.querySelectorAll('.task-checkbox[data-id]').forEach(el => {
            el.addEventListener('click', () => toggleTask(el.dataset.id));
        });
        container.querySelectorAll('.more-btn[data-id]').forEach(el => {
            el.addEventListener('click', () => openEditModal(el.dataset.id));
        });
        container.querySelectorAll('.step-check[data-step-id]').forEach(el => {
            el.addEventListener('click', () => toggleStep(el.dataset.taskId, el.dataset.stepId));
        });

        // Completed section toggle
        const header = document.getElementById('completedHeader');
        if (header) {
            header.addEventListener('click', () => {
                const tasks = document.getElementById('completedTasks');
                const chev = document.getElementById('completedChevron');
                tasks.classList.toggle('visible');
                chev.classList.toggle('open');
            });
        }
    }

    function taskCardHTML(task, completed) {
        const dueStr = formatDue(task.due_date, task.due_time);
        const stepsBadge = (task.total_steps > 0)
            ? `<span class="task-steps-badge ${task.completed_steps === task.total_steps ? 'done' : ''}">${task.completed_steps || 0}/${task.total_steps}</span>`
            : '';
        // Value badge — look up from loaded values cache
        let valueBadge = '';
        if (task.value_id && state.valuesMap) {
            const v = state.valuesMap[task.value_id];
            if (v) {
                const bg = v.color || '#e8e5e0';
                // Compute readable text color from badge background
                const textColor = valueBadgeTextColor(bg);
                valueBadge = `<span class="task-value-badge" style="background:${bg};color:${textColor}">${escHtml(v.value_name)}</span>`;
            }
        }
        const recurIcon = (task.recurrence_type && task.recurrence_type !== 'none')
            ? `<span class="task-recurrence-icon" title="Recurring">🔄</span>` : '';
        return `
            <div class="task-card ${completed ? 'completed-task' : ''}" data-id="${task.id}">
                <div class="task-checkbox ${completed ? 'done' : ''}" data-id="${task.id}">${completed ? '✓' : ''}</div>
                <div class="task-body">
                    <span class="task-title">${escHtml(task.title)}</span>
                    <div class="task-badges">
                        ${valueBadge}
                        ${stepsBadge}
                        ${recurIcon}
                        ${dueStr ? `<span class="task-due ${dueStr.cls}">${dueStr.icon} ${dueStr.text}</span>` : ''}
                    </div>
                </div>
                <div class="task-actions">
                    <button class="icon-btn more-btn" data-id="${task.id}">›</button>
                </div>
            </div>
        `;
    }

    function formatDue(date, time) {
        if (!date) return null;
        // Prisma @db.Date returns ISO timestamp like "2026-05-27T00:00:00.000Z" — extract YYYY-MM-DD
        const dateStr = String(date).split('T')[0];
        const d = new Date(dateStr + (time ? 'T' + time : 'T00:00:00'));
        if (isNaN(d.getTime())) return null;
        const today = new Date(); today.setHours(0,0,0,0);
        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
        const taskDay = new Date(d); taskDay.setHours(0,0,0,0);
        const cls = taskDay < today ? 'overdue' : taskDay.getTime() === today.getTime() ? 'today' : '';
        let text = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        if (time) text += ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        return { text, cls, icon: taskDay < today ? '⚠' : taskDay.getTime() === today.getTime() ? '🎯' : '📅' };
    }

    function escHtml(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Determine readable text color (dark or light) for a hex badge background
    function valueBadgeTextColor(hex) {
        const c = hex.replace('#', '');
        const r = parseInt(c.substring(0,2), 16) || 0;
        const g = parseInt(c.substring(2,4), 16) || 0;
        const b = parseInt(c.substring(4,6), 16) || 0;
        // Perceived brightness formula
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        return brightness > 160 ? '#1a1a1a' : '#ffffff';
    }

    // ── Completion micro-animation ──────────────────────────────────────────────
    function playCompletionAnim(checkEl) {
        checkEl.classList.add('done');

        // Card flash
        const card = checkEl.closest('.task-card');
        if (card) {
            card.classList.add('completing');
            card.addEventListener('animationend', () => card.classList.remove('completing'), { once: true });
        }

        // Particle burst
        const rect = checkEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const colors = ['#5BA4A4','#c9a84c','#a8d8d8','#f0c96a','#4A9292','#d4b56a'];
        for (let i = 0; i < 8; i++) {
            const p = document.createElement('span');
            p.className = 'task-complete-particle';
            const angle = (i / 8) * 360;
            const dist = 20 + Math.random() * 16;
            const tx = Math.cos(angle * Math.PI / 180) * dist;
            const ty = Math.sin(angle * Math.PI / 180) * dist;
            p.style.cssText = `left:${cx - 3}px;top:${cy - 3}px;background:${colors[i % colors.length]};--tx:${tx}px;--ty:${ty}px;animation-delay:${(Math.random() * 0.05).toFixed(3)}s`;
            document.body.appendChild(p);
            p.addEventListener('animationend', () => p.remove(), { once: true });
        }

        // Float-up reward text
        const label = document.createElement('span');
        label.className = 'task-done-label';
        label.textContent = '✓ done';
        label.style.cssText = `left:${cx + 10}px;top:${cy - 8}px`;
        document.body.appendChild(label);
        label.addEventListener('animationend', () => label.remove(), { once: true });
    }

    // ── Toggle task ────────────────────────────────────────────────────────────
    async function toggleTask(taskId) {
        if (!taskId || taskId === 'null' || taskId === 'undefined') {
            showToast('[toggle] bad ID "' + taskId + '" — task may be missing from DB. Refresh the page.');
            return;
        }
        try {
            const data = await api('PATCH', '/api/tasks/' + taskId + '/toggle');
            if (data.success) {
                const check = document.querySelector('.task-checkbox[data-id="' + taskId + '"]');
                if (check) playCompletionAnim(check);
                setTimeout(() => fetchTasks(), 420);
                fetchSummary();
            } else {
                showToast('[toggle #' + taskId + '] ' + (data.message || 'no error detail'));
            }
        } catch(e) {
            showToast('[toggle #' + taskId + '] network: ' + e.message);
        }
    }

    // ── Toggle step ─────────────────────────────────────────────────────────────
    async function toggleStep(taskId, stepId) {
        await api('PATCH', '/api/tasks/' + taskId + '/steps/' + stepId + '/toggle');
        fetchTasks();
        fetchSummary();
    }

    // ── Add task ────────────────────────────────────────────────────────────────
    async function addTask() {
        const input = document.getElementById('taskInput');
        const title = input.value.trim();
        if (!title) return;

        const steps = Array.from(document.querySelectorAll('#stepInputs input'))
            .map(i => i.value.trim()).filter(s => s);

        const body = { title };
        if (steps.length > 0) body.steps = steps;

        const data = await api('POST', '/api/tasks', body);
        if (data.success) {
            input.value = '';
            document.getElementById('stepsArea').classList.remove('visible');
            document.getElementById('stepInputs').innerHTML = '';
            state.breakdownOn = false;
            document.getElementById('breakdownTrack').classList.remove('on');
            fetchTasks();
            fetchSummary();
        } else if (data.upgrade_required) {
            document.getElementById('upgradeBanner').style.display = 'flex';
            showToast(data.message || 'Free plan limit reached');
        } else {
            showToast(data.message || 'Failed to add task');
        }
    }

    // ── AI breakdown ────────────────────────────────────────────────────────────
    async function requestSteps(title) {
        if (!title.trim() || title.trim().length < 3) return;
        const loading = document.getElementById('stepLoading');
        loading.classList.add('visible');
        const data = await api('POST', '/api/tasks/suggest-steps', { title });
        loading.classList.remove('visible');
        if (!data.is_pro) {
            document.getElementById('aiSection').style.display = 'block';
            renderAISuggestions([{ title, steps: data.suggestions || [] }]);
            return;
        }
        if (data.suggestions && data.suggestions.length > 0) {
            const container = document.getElementById('stepInputs');
            container.innerHTML = data.suggestions.map(s => `
                <div class="step-row">
                    <input type="text" value="${escHtml(s)}" placeholder="Step">
                    <button class="btn-remove-step" type="button">×</button>
                </div>
            `).join('');
            container.querySelectorAll('.btn-remove-step').forEach(btn => {
                btn.addEventListener('click', () => btn.closest('.step-row').remove());
            });
            document.getElementById('stepsArea').classList.add('visible');
        }
    }

    function renderAISuggestions(suggestions) {
        const container = document.getElementById('aiSuggestions');
        container.innerHTML = suggestions.map(s => `
            <div class="ai-card">
                <div class="ai-card-title">${escHtml(s.title)}</div>
                <ul class="ai-steps">${(s.steps||[]).map(step => `<li>${escHtml(step)}</li>`).join('')}</ul>
                <div class="ai-actions">
                    <button class="ai-btn-add" onclick="acceptAISuggestion(this)" data-title="${escHtml(s.title)}" data-steps="${(s.steps||[]).map(escHtml).join('|||')}">Add task</button>
                    <button class="ai-btn-dismiss" onclick="dismissAISuggestion(this)">Dismiss</button>
                </div>
            </div>
        `).join('');
    }

    window.acceptAISuggestion = async function(btn) {
        const title = btn.dataset.title;
        const steps = btn.dataset.steps.split('|||').filter(s => s);
        const data = await api('POST', '/api/tasks', { title, steps });
        if (data.success) {
            btn.closest('.ai-card').remove();
            if (!document.querySelector('.ai-card')) document.getElementById('aiSection').style.display = 'none';
            fetchTasks();
            fetchSummary();
        }
    };

    window.dismissAISuggestion = function(btn) {
        btn.closest('.ai-card').remove();
        if (!document.querySelector('.ai-card')) document.getElementById('aiSection').style.display = 'none';
    };

    // ── Edit modal ──────────────────────────────────────────────────────────────
    function openEditModal(taskId) {
        const task = state.tasks.find(t => t.id == taskId);
        if (!task) {
            showToast('[modal #' + taskId + '] not in state (' + state.tasks.length + ' loaded)');
            return;
        }
        state.editingId = taskId;
        document.getElementById('editTitle').value = task.title || '';
        document.getElementById('editDueDate').value = task.due_date ? String(task.due_date).split('T')[0] : '';
        document.getElementById('editDueTime').value = task.due_time || '';
        document.getElementById('editNotes').value = task.notes || '';
        document.getElementById('editModal').classList.add('open');
        document.getElementById('editTitle').focus();
    }

    function closeModal() {
        document.getElementById('editModal').classList.remove('open');
        state.editingId = null;
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('editModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

    document.getElementById('modalSave').addEventListener('click', async () => {
        if (!state.editingId) return;
        const data = {
            title: document.getElementById('editTitle').value.trim(),
            due_date: document.getElementById('editDueDate').value || null,
            due_time: document.getElementById('editDueTime').value || null,
            notes: document.getElementById('editNotes').value || null,
        };
        if (!data.title) { showToast('Title is required'); return; }
        const result = await api('PATCH', '/api/tasks/' + state.editingId, data);
        if (result.success) {
            closeModal();
            fetchTasks();
        } else {
            showToast(result.message || 'Failed to update');
        }
    });

    document.getElementById('modalDelete').addEventListener('click', async () => {
        if (!state.editingId) return;
        if (!confirm('Delete this task? This can\u2019t be undone.')) return;
        const result = await api('DELETE', '/api/tasks/' + state.editingId);
        if (result.success) {
            closeModal();
            fetchTasks();
            fetchSummary();
        }
    });

    // ── Filter tabs ────────────────────────────────────────────────────────────
    document.getElementById('filterTabs').addEventListener('click', (e) => {
        const tab = e.target.closest('.filter-tab');
        if (!tab) return;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.filter = tab.dataset.filter;
        fetchTasks();
    });

    // ── Sort ────────────────────────────────────────────────────────────────────
    document.getElementById('sortBtn').addEventListener('click', () => {
        state.sort = state.sort === 'default' ? 'due_date' : 'default';
        const btn = document.getElementById('sortBtn');
        btn.classList.toggle('active', state.sort === 'due_date');
        btn.textContent = state.sort === 'due_date' ? 'Due date ✓' : 'Due date';
        fetchTasks();
    });

    // ── Breakdown toggle ─────────────────────────────────────────────────────────
    document.getElementById('breakdownToggle').addEventListener('click', () => {
        state.breakdownOn = !state.breakdownOn;
        const track = document.getElementById('breakdownTrack');
        track.classList.toggle('on', state.breakdownOn);
        if (!state.breakdownOn) {
            document.getElementById('stepsArea').classList.remove('visible');
            document.getElementById('stepInputs').innerHTML = '';
        }
    });

    // ── Add step button ──────────────────────────────────────────────────────────
    document.getElementById('addStepBtn').addEventListener('click', () => {
        const container = document.getElementById('stepInputs');
        const row = document.createElement('div');
        row.className = 'step-row';
        row.innerHTML = `<input type="text" placeholder="Subtask"><button class="btn-remove-step" type="button">×</button>`;
        container.appendChild(row);
        row.querySelector('.btn-remove-step').addEventListener('click', () => row.remove());
        row.querySelector('input').focus();
    });

    // Step remove listeners (delegate)
    document.getElementById('stepInputs').addEventListener('click', (e) => {
        if (e.target.classList.contains('btn-remove-step')) e.target.closest('.step-row').remove();
    });

    // ── Add task button ────────────────────────────────────────────────────────
    document.getElementById('addBtn').addEventListener('click', addTask);
    document.getElementById('taskInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addTask();
        // Trigger AI breakdown when toggle is on and title looks complete
        if (e.key === 'Enter' && state.breakdownOn && e.target.value.trim().length >= 5) {
            requestSteps(e.target.value.trim());
        }
    });

    // ── Logout ──────────────────────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('fl_token');
        document.cookie = 'fl_sid=; Max-Age=0; path=/';
        location.href = '/login';
    });

    // ── FAB / Quick-Add ─────────────────────────────────────────────────────────
    function openQuickAdd() {
        document.getElementById('qaOverlay').classList.add('open');
        setTimeout(() => document.getElementById('qaInput').focus(), 50);
    }

    function closeQuickAdd() {
        const overlay = document.getElementById('qaOverlay');
        overlay.classList.remove('open');
        document.getElementById('qaInput').value = '';
        document.getElementById('qaChips').innerHTML = '';
        document.getElementById('qaSave').disabled = true;
    }

    document.getElementById('fabBtn').addEventListener('click', openQuickAdd);
    document.getElementById('qaClose').addEventListener('click', closeQuickAdd);
    document.getElementById('qaOverlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeQuickAdd();
    });

    document.getElementById('qaInput').addEventListener('input', function() {
        const val = this.value.trim();
        document.getElementById('qaSave').disabled = !val;
        if (!val) { document.getElementById('qaChips').innerHTML = ''; return; }
        const { parsed } = window._qaParse(val);
        const label = window._qaChipLabel(parsed);
        const container = document.getElementById('qaChips');
        if (label) {
            container.innerHTML = `<span class="qa-chip"><span class="chip-dot"></span>${label}</span>`;
        } else {
            container.innerHTML = '';
        }
    });

    document.getElementById('qaInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.target.disabled) quickAddSave();
        if (e.key === 'Escape') closeQuickAdd();
    });

    document.getElementById('qaSave').addEventListener('click', quickAddSave);

    async function quickAddSave() {
        const input = document.getElementById('qaInput');
        const val = input.value.trim();
        if (!val) return;

        const { parsed, remaining } = window._qaParse(val);
        const body = { title: remaining };
        if (parsed.date) body.due_date = parsed.date;
        if (parsed.time) body.due_time = parsed.time;

        const data = await api('POST', '/api/tasks', body);
        if (data.success) {
            closeQuickAdd();
            fetchTasks();
            fetchSummary();
        } else {
            showToast(data.message || 'Failed to add task');
        }
    }

    // Expose date parser for FAB on any tab
    window._qaParse = window._qaParse || function(text) {
        return { parsed: { date: null, time: null }, remaining: text };
    };
    window._qaChipLabel = window._qaChipLabel || function() { return null; };

    // ── Mobile bottom nav ───────────────────────────────────────────────────────
    function buildMobileNav() {
        const user = getUser();
        const nav = document.getElementById('mobileNav');
        nav.innerHTML = `
            <a href="/app/tasks" class="bottom-tab active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
                Tasks
            </a>
            <a href="/app/money" class="bottom-tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Money
            </a>
            <a href="/app/vault" class="bottom-tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                Vault
            </a>
            <a href="/app/buddy" class="bottom-tab" id="navBuddyTab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Buddy
            </a>
        `;
    }

    // ── Load user values into state.valuesMap for badge rendering ──────────────
    async function loadValuesMap() {
        try {
            const values = await ValuesService.loadValues();
            const map = {};
            values.forEach(v => { map[v.id] = v; });
            state.valuesMap = map;
        } catch { state.valuesMap = {}; }
    }

    // ── Init ────────────────────────────────────────────────────────────────────
    async function init() {
        const user = getUser();
        if (!user) { location.href = '/login'; return; }

        buildMobileNav();

        // Wire Buddy nav tab to open panel instead of navigating
        document.getElementById('navBuddyTab').addEventListener('click', function(e) {
            if (typeof window.openBuddyPanel === 'function') {
                e.preventDefault();
                window.openBuddyPanel();
            } else {
                e.preventDefault();
                var status = window.__buddyReady === false
                    ? '[buddy] skip: ' + (window.__buddySkip || window.__buddyError || 'unknown')
                    : '[buddy] openBuddyPanel not set yet';
                showToast(status);
            }
        });

        // Wire date parser to FAB system
        window._qaParse = parseNaturalLanguage;
        window._qaChipLabel = chipLabel;

        // Pro badge
        document.getElementById('proBadge').classList.add('visible');

        // Load values first so badges render on first paint
        await loadValuesMap();

        // Load data
        await Promise.all([fetchTasks(), fetchSummary()]);
    }

    init();
    </script>
    <script src="/buddy-widget.js"></script>
</body>
</html>
