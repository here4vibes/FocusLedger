                        planAccepted = true;
                        showToast('🎯 Plan locked in — let\'s do this!');
                        // Replace morning card with accepted view
                        var morningCard = el('morningCard');
                        if (morningCard) {
                            morningCard.outerHTML = buildAcceptedCard(result.plan);
                        }
                        // Record buddy_checkins morning record
                        var task1Id = result.plan && result.plan.task_1_id;
                        apiFetch('/api/buddy/morning', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ selected_task_id: task1Id, date: TODAY })
                        }).catch(function() {});
                        if (isEvening) { recordEveningRecap(); }
                    } else {
                        btn.disabled = false;
                        btn.textContent = '✅ Accept this plan';
                        showToast('Couldn\'t save. Try again?');
                    }
                })
                .catch(function() {
                    btn.disabled = false;
                    btn.textContent = '✅ Accept this plan';
                    showToast('Couldn\'t save. Try again?');
                });
            });
        }

        function buildAcceptedCard(plan) {
            var html = '<div class="card">';
            html += '<div class="card-label">Morning check-in</div>';
            html += '<div class="plan-accepted-badge">🎯 Plan locked in for today</div>';
            html += '<div class="plan-slots">';
            for (var i = 1; i <= 3; i++) {
                var slot = currentSlots[i-1];
                var taskTitle = slot && slot.task ? slot.task.title : null;
                var reason = plan['task_' + i + '_reason'];
                var activation = slot ? slot.activation : 'Medium';
                if (!taskTitle && !plan['task_' + i + '_id']) continue;
                html += '<div class="plan-slot">';
                html += '<div class="plan-slot-num">' + i + '</div>';
                html += '<div class="plan-slot-body">';
                html += '<div class="plan-slot-title">' + escHtml(taskTitle || '(task)') + '</div>';
                if (reason) {
                    var actClass = activation === 'Low' ? 'activation-low' : activation === 'High' ? 'activation-high' : 'activation-med';
                    html += '<div class="plan-slot-meta"><span class="plan-slot-reason">' + escHtml(reason) + '</span>';
                    html += '<span class="activation-badge ' + actClass + '">' + escHtml(activation) + '</span></div>';
                }
                html += '</div></div>';
            }
            html += '</div></div>';
            return html;
        }

        // ── Regenerate plan ───────────────────────────────────────────────────
        function wireRegenBtn() {
            var btn = el('regenPlanBtn');
            if (!btn) return;
            btn.addEventListener('click', function() {
                btn.disabled = true;
                btn.textContent = '⏳ Thinking...';
                apiFetch('/api/buddy/daily-plan/regenerate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mood: selectedMood, date: TODAY })
                })
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    btn.disabled = false;
                    btn.textContent = '🎲 Regenerate';
                    if (result.success) {
                        currentSlots = result.slots || [null, null, null];
                        var planArea = el('planArea');
                        if (planArea) {
                            planArea.innerHTML = renderPlanSlots(result.plan, currentSlots);
                            wireAcceptBtn();
                            wireRegenBtn();
                            wireSwapBtns();
                        }
                    }
                })
                .catch(function() {
                    btn.disabled = false;
                    btn.textContent = '🎲 Regenerate';
                    showToast('Couldn\'t regenerate. Try again?');
                });
            });
        }

        // ── Swap task ─────────────────────────────────────────────────────────
        function wireSwapBtns() {
            document.querySelectorAll('[data-swap-slot]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    swappingSlot = parseInt(btn.dataset.swapSlot, 10);
                    openSwapModal();
                });
            });
        }

        function openSwapModal() {
            var list = el('swapTaskList');
            if (!list) return;

            // Get IDs currently in the plan (to exclude from picker)
            var inPlan = currentSlots.map(function(s) { return s && s.task ? s.task.id : null; });
            var available = allTasks.filter(function(t) { return inPlan.indexOf(t.id) === -1; });

            if (!available.length) {
                showToast('No other tasks to swap in right now.');
                return;
            }

            var html = '';
            available.slice(0, 20).forEach(function(t) {
                html += '<div class="swap-task-item" data-task-id="' + t.id + '" data-task-title="' + escHtml(t.title) + '">';
                html += '<span class="swap-task-bullet"></span>';
                html += escHtml(t.title);
                html += '</div>';
            });
            list.innerHTML = html;

            // Wire item clicks
            list.querySelectorAll('.swap-task-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    var taskId = parseInt(item.dataset.taskId, 10);
                    var taskTitle = item.dataset.taskTitle;
                    doSwap(taskId, taskTitle);
                    closeSwapModal();
                });
            });

            el('swapModalOverlay').style.display = 'flex';
        }

        function closeSwapModal() {
            el('swapModalOverlay').style.display = 'none';
            swappingSlot = null;
        }

        function doSwap(taskId, taskTitle) {
            if (!swappingSlot) return;
            var slotIndex = swappingSlot - 1;

            apiFetch('/api/buddy/daily-plan/swap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slot: swappingSlot, new_task_id: taskId, date: TODAY })
            })
            .then(function(r) { return r.json(); })
            .then(function(result) {
                if (result.success) {
                    // Update local slot
                    currentSlots[slotIndex] = {
                        task: { id: taskId, title: taskTitle, is_completed: false },
                        reason: 'Your pick',
                        activation: 'Medium'
                    };
                    showToast('Swapped in: ' + taskTitle);
                    // Re-render plan area
                    var planArea = el('planArea');
                    if (planArea) {
                        planArea.innerHTML = renderPlanSlots(result.plan, currentSlots);
                        wireAcceptBtn();
                        wireRegenBtn();
                        wireSwapBtns();
                    }
                } else {
                    showToast('Swap failed. Try again?');
                }
            })
            .catch(function() { showToast('Swap failed. Try again?'); });
        }

        // ── Evening recap recording ───────────────────────────────────────────
        var eveningRecorded = false;
        function recordEveningRecap() {
            if (eveningRecorded) return;
            eveningRecorded = true;
            apiFetch('/api/buddy/evening', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: TODAY })
            }).catch(function() {});
        }
        if (isEvening) { setTimeout(recordEveningRecap, 2000); }

        // ── Mid-day check-in banner ────────────────────────────────────────────
        var localHour = getLocalHour();
        // Only show mid-day check-ins during daytime, not evening
        if (!isEvening && localHour >= 8 && localHour < 17) {
            setTimeout(loadMiddayCheckin, 1800);
        }

        function loadMiddayCheckin() {
            apiFetch('/api/buddy/midday-checkin?hour=' + localHour)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (!data.success || !data.checkinType || data.alreadyDone) return;
                    renderMiddayBanner(data);
                })
                .catch(function() {});
        }

        function renderMiddayBanner(data) {
            var banner = el('middayBanner');
            if (!banner) return;

            var type = data.checkinType;
            var planId = data.planId;
            var remaining = data.remainingSlots || [];
            var icon, title, sub, responses;

            if (type === 'post_plan') {
                icon = '⚡';
                title = 'How\'s task #1 going?';
                sub = 'Quick check-in — no judgment.';
                responses = [
                    { key: 'done', label: '✅ Done' },
                    { key: 'working', label: '🔄 On it' },
                    { key: 'switching', label: '⏭️ Switching' }
                ];
            } else if (type === 'afternoon_energy') {
                icon = '☀️';
                title = 'Afternoon check-in';
                sub = remaining.length > 0
                    ? 'Energy dip? Which of your remaining tasks feels most doable right now?'
                    : 'How\'s your afternoon going?';
                if (remaining.length > 0) {
                    responses = remaining.map(function(s, i) {
                        return { key: 'pick_' + (s.task ? s.task.id : i), label: s.task ? s.task.title.slice(0, 28) + (s.task.title.length > 28 ? '…' : '') : 'Task ' + (i+1) };
                    });
                    responses.push({ key: 'neither', label: '😮‍💨 Neither right now' });
                } else {
                    responses = [
                        { key: 'good', label: '💪 Good energy' },
                        { key: 'low', label: '😪 Running low' },
                        { key: 'done_for_day', label: '✅ All done!' }
                    ];
                }
            } else if (type === 'pre_evening') {
                icon = '🌅';
                title = 'One more thing?';
                sub = 'You have about an hour before evening recap. Want to knock one more task out?';
                responses = [
                    { key: 'yes', label: '💪 Let\'s go' },
                    { key: 'wrap_up', label: '✅ I\'m wrapping up' },
                    { key: 'skip', label: '😮‍💨 Done for today' }
                ];
            }

            if (!responses) return;

            var html = '<div class="midday-banner">';
            html += '<div class="midday-banner-icon">' + icon + '</div>';
            html += '<div class="midday-banner-body">';
            html += '<div class="midday-banner-title">' + escHtml(title) + '</div>';
            html += '<div class="midday-banner-sub">' + escHtml(sub) + '</div>';
            html += '<div class="midday-response-btns" id="middayRespBtns">';
            responses.forEach(function(r) {
                html += '<button class="midday-resp-btn" data-resp-key="' + escHtml(r.key) + '">' + escHtml(r.label) + '</button>';
            });
            html += '</div></div></div>';

            banner.innerHTML = html;
            banner.style.display = '';

            // Wire response buttons
            var btns = banner.querySelectorAll('.midday-resp-btn');
            btns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var key = btn.dataset.respKey;
                    btns.forEach(function(b) { b.classList.remove('picked'); });
                    btn.classList.add('picked');

                    apiFetch('/api/buddy/midday-checkin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            checkin_type: type,
                            plan_id: planId,
                            response: { answer: key }
                        })
                    }).catch(function() {});

                    setTimeout(function() { banner.style.display = 'none'; }, 1000);
                    if (key === 'done') { showToast('Nice! One down.'); }
                    else if (key === 'yes') { showToast('Let\'s finish strong!'); }
                    else { showToast('Got it 👍'); }
                }, { once: true });
            });
        }

        // ── Pattern Dashboard ──────────────────────────────────────────────────
        // Load after primary content so it doesn't block the main view.
        setTimeout(loadPatterns, 2500);

        function loadPatterns() {
            apiFetch('/api/buddy/patterns')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (!data.success || !data.patterns) return;
                    renderPatternDashboard(data.patterns);
                })
                .catch(function() {});
        }

        function renderPatternDashboard(p) {
            var section = el('patternsSection');
            if (!section) return;

            var html = '';
            html += '<button class="patterns-toggle" id="patternsToggle">';
            html += '<span>📊 Your Patterns</span>';
            html += '<span class="patterns-toggle-chevron">▼</span>';
            html += '</button>';
            html += '<div class="patterns-body" id="patternsBody">';

            // ── Streak + completion stats grid ────────────────────────────────
            var streak = p.streak || { currentStreak: 0, longestStreak: 0 };
            var stats = p.completionStats || { last7: { rate: 0, completed: 0 }, last30: { rate: 0, completed: 0 } };
            html += '<div class="stat-grid">';
            html += '<div class="stat-tile"><div class="stile-num">' + streak.currentStreak + '</div><div class="stile-label">day streak</div><div class="stile-sub">' + (streak.currentStreak > 0 ? '🔥 Active' : 'Start today') + '</div></div>';
            html += '<div class="stat-tile"><div class="stile-num">' + stats.last7.rate + '%</div><div class="stile-label">completion rate<br>(7 days)</div></div>';
            html += '<div class="stat-tile"><div class="stile-num">' + stats.last7.completed + '</div><div class="stile-label">tasks done<br>this week</div></div>';
            html += '<div class="stat-tile"><div class="stile-num">' + stats.last30.completed + '</div><div class="stile-label">tasks done<br>this month</div></div>';
            html += '</div>';

            // ── Energy peak ────────────────────────────────────────────────────
            if (p.energyPatterns && p.energyPatterns.peakLabel) {
                html += '<div class="energy-peak-bar">';
                html += '<div class="energy-peak-label">⏰ Energy pattern</div>';
                html += '<div class="energy-peak-text">You get the most done in the <strong>' + escHtml(p.energyPatterns.peakLabel) + '</strong>. Schedule your hardest task for that window.</div>';
                html += '</div>';
            }

            // ── Spending correlations (THE MOAT) ───────────────────────────────
            if (p.spendingCorrelations && p.spendingCorrelations.length > 0) {
                p.spendingCorrelations.forEach(function(sc) {
                    html += '<div class="spending-correlation-item">';
                    html += '<div class="sc-label">💸 Stress spending detected</div>';
                    html += escHtml('You\'ve been avoiding "' + sc.task.title + '" for ' + sc.ageDays + ' days. Your spending went up ' + sc.spendingIncreasePct + '% in the same period.');
                    html += '</div>';
                });
            }

            // ── Avoidance hall of fame ─────────────────────────────────────────
            var avoided = p.avoidedTasks || [];
            if (avoided.length > 0) {
                html += '<div class="avoided-list">';
                avoided.forEach(function(item, idx) {
                    var trophy = idx === 0 ? '🏆' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '📌';
                    html += '<div class="avoided-item">';
                    html += '<span class="avoided-trophy">' + trophy + '</span>';
                    html += '<span class="avoided-title">' + escHtml(item.task.title) + '</span>';
                    html += '<span class="avoided-age">' + item.ageDays + 'd</span>';
                    html += '</div>';
                });
                html += '</div>';
                html += '<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.75rem;">Hall of Fame: tasks sitting longest without completion.</div>';
            }

            if (!p.avoidedTasks.length && !p.energyPatterns) {
                html += '<div style="text-align:center;padding:1rem 0;color:var(--text-muted);font-size:0.88rem;">Complete more tasks to unlock patterns. Check back after a few days!</div>';
            }

            html += '</div>'; // end patterns-body

            section.innerHTML = html;
            section.style.display = '';

            // Accordion toggle
            var toggleBtn = el('patternsToggle');
            var body = el('patternsBody');
            if (toggleBtn && body) {
                toggleBtn.addEventListener('click', function() {
                    var isOpen = body.classList.contains('open');
                    body.classList.toggle('open', !isOpen);
                    toggleBtn.classList.toggle('open', !isOpen);
                });
            }
        }

        // ── Life nudges (Evening only) ─────────────────────────────────────────
        if (isEvening) { setTimeout(fetchBuddyNudges, 1500); }

        function fetchBuddyNudges() {
            apiFetch('/api/nudge-system/preferences')
                .then(function(r) { return r.json(); })
                .then(function(prefs) {
                    var buddyEnabled = !prefs.preferences || prefs.preferences.buddy_enabled !== false;
                    if (!buddyEnabled) return;
                    return apiFetch('/api/nudge-system/pending')
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (data && data.nudges && data.nudges.length > 0) renderBuddyNudges(data.nudges);
                        });
                })
                .catch(function() {});
        }

        function renderBuddyNudges(nudges) {
            var container = el('buddyNudges');
            if (!container) return;
            var html = '<div class="buddy-nudge-header">By the way —</div>';
            nudges.forEach(function(n) {
                var cls = n.urgency === 'urgent' ? 'buddy-nudge-item urgent' : 'buddy-nudge-item';
                html += '<div class="' + cls + '" data-nudge-id="' + n.id + '">';
                html += '<div class="buddy-nudge-text">' + escHtml(n.message) + '</div>';
                html += '<button class="buddy-nudge-dismiss" data-dismiss-nudge="' + n.id + '" title="Dismiss" aria-label="Dismiss nudge">✕</button>';
                html += '</div>';
            });
            container.innerHTML = html;
            container.style.display = '';
            container.addEventListener('click', function(e) {
                var btn = e.target.closest('[data-dismiss-nudge]');
                if (!btn) return;
                var nudgeId = btn.dataset.dismissNudge;
                var item = container.querySelector('[data-nudge-id="' + nudgeId + '"]');
                if (item) {
                    item.style.opacity = '0.4'; item.style.pointerEvents = 'none';
                    setTimeout(function() {
                        item.remove();
                        if (!container.querySelector('.buddy-nudge-item')) container.style.display = 'none';
                    }, 200);
                }
                apiFetch('/api/nudge-system/dismiss/' + nudgeId, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }
                }).catch(function() {});
            });
        }

    })();
    </script>
<script src="/js/date-parser.js"></script>
<script>
(function(){
  var fab=null,qOverlay=null,token=localStorage.getItem('fl_token');
  function openQA(){qOverlay=document.getElementById('qaOverlay')||createQASheet();qOverlay.classList.add('open');setTimeout(function(){var i=document.getElementById('qaInput');if(i)i.focus();},50)}
  function closeQA(){if(qOverlay)qOverlay.classList.remove('open');var i=document.getElementById('qaInput');if(i){i.value='';document.getElementById('qaChips').innerHTML='';document.getElementById('qaSave').disabled=true}}
  function createQASheet(){
    var div=document.createElement('div');div.id='qaOverlay';div.className='qa-overlay';
    div.innerHTML='<div class="qa-sheet"><div class="qa-title-row"><h3>Quick Add</h3><button class="qa-close" id="qaClose">×</button></div><div class="qa-input-row"><input type="text" class="qa-input" id="qaInput" placeholder="What needs to get done?" maxlength="150" autocomplete="off"><button class="qa-save" id="qaSave" disabled>Add</button></div><div class="qa-chips" id="qaChips"></div></div>';
    document.body.appendChild(div);
    div.addEventListener('click',function(e){if(e.target===div)closeQA()});
    document.getElementById('qaClose').addEventListener('click',closeQA);
    document.getElementById('qaInput').addEventListener('input',function(){
      var v=this.value.trim();document.getElementById('qaSave').disabled=!v;
      if(!v){document.getElementById('qaChips').innerHTML='';return}
      var res=window._qaParse?window._qaParse(this.value):{parsed:{date:null,time:null},remaining:this.value};
      var lbl=window._qaChipLabel?window._qaChipLabel(res.parsed):null;
      document.getElementById('qaChips').innerHTML=lbl?'<span class="qa-chip"><span class="chip-dot"></span>'+lbl+'</span>':'';
    });
    document.getElementById('qaInput').addEventListener('keydown',function(e){
      if(e.key==='Enter'&&!e.target.disabled)qaSave();
      if(e.key==='Escape')closeQA();
    });
    document.getElementById('qaSave').addEventListener('click',qaSave);
    return div;
  }
  function qaSave(){
    var v=document.getElementById('qaInput').value.trim();if(!v)return;
    var res=window._qaParse?window._qaParse(v):{parsed:{date:null,time:null},remaining:v};
    var body={title:res.remaining};if(res.parsed.date)body.due_date=res.parsed.date;if(res.parsed.time)body.due_time=res.parsed.time;
    fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(d){
      if(d.success){closeQA();}else{var t=document.createElement('div');t.textContent=d.message||'Failed to add task';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:0.65rem 1.25rem;border-radius:10px;font-size:0.85rem;font-weight:500;z-index:9999';document.body.appendChild(t);setTimeout(function(){t.remove()},2500);}
    });
  }
  window._qaParse=parseNaturalLanguage;window._qaChipLabel=chipLabel;
  fab=document.createElement('button');fab.className='fab';fab.title='Quick add task';fab.textContent='+';fab.addEventListener('click',openQA);document.body.appendChild(fab);
})();
</script>
