<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#011e5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FocusLedger">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/fl-icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/fl-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light">
  <title>Time Blocking — FocusLedger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared-nav.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:   #011e5c;
      --gold:   #f0b429;
      --cream:  #faf9f6;
      --cream2: #f4f2ee;
      --text:   #1a1a1a;
      --muted:  rgba(1,30,92,0.4);
      --border: rgba(1,30,92,0.07);
      --now:    #f0b429;
      --slot-h: 64px;
      --tc-w:   52px;
      --sc-w:   44px;
    }

    html, body {
      height: 100%; font-family: 'DM Sans', sans-serif;
      background: var(--cream); color: var(--text);
      overflow: hidden;
    }

    /* ── App shell — accounts for shared nav ─────────────────── */
    .cal-root {
      position: fixed;
      top: 0; bottom: 0; right: 0;
      left: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    @media (min-width: 900px) {
      .cal-root { left: 200px; }
    }
    @media (max-width: 899px) {
      .cal-root { bottom: 60px; }
    }

    /* ── Header ──────────────────────────────────────────────── */
    .cal-hdr {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem 0.6rem;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }
    .hdr-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .month-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted);
    }
    .hdr-nav { display: flex; gap: 0.25rem; }
    .hdr-nav-btn {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1.5px solid var(--border);
      background: white; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--navy); transition: border-color 0.15s;
    }
    .hdr-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
    .today-pill {
      height: 28px; padding: 0 0.75rem;
      border-radius: 14px; border: 1.5px solid var(--border);
      background: white; cursor: pointer;
      font-size: 0.75rem; font-weight: 600; color: var(--navy);
      transition: all 0.15s; font-family: 'Space Grotesk', sans-serif;
    }
    .today-pill:hover { border-color: var(--gold); color: var(--gold); }

    /* Week strip */
    .week-strip {
      display: flex; gap: 0.3rem; overflow-x: auto;
      scrollbar-width: none;
    }
    .week-strip::-webkit-scrollbar { display: none; }
    .day-pill {
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; gap: 2px;
      padding: 0.35rem 0.6rem; border-radius: 10px;
      border: 1.5px solid transparent;
      cursor: pointer; transition: all 0.15s;
      min-width: 44px;
    }
    .day-pill:hover { background: rgba(1,30,92,0.05); }
    .day-pill.active {
      background: var(--navy); border-color: var(--navy);
    }
    .day-pill.today:not(.active) { border-color: var(--gold); }
    .pill-name {
      font-size: 0.67rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted);
    }
    .day-pill.active .pill-name { color: rgba(255,255,255,0.7); }
    .day-pill.today:not(.active) .pill-name { color: var(--gold); }
    .pill-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem; font-weight: 600; color: var(--navy);
      line-height: 1;
    }
    .day-pill.active .pill-num { color: white; }
    .day-pill.today:not(.active) .pill-num { color: var(--gold); }
    .pill-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
    .day-pill.active .pill-dot { background: rgba(255,255,255,0.6); }

    /* Day headline */
    .day-headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--navy); margin-top: 0.6rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .day-headline .today-tag {
      font-size: 0.67rem; font-weight: 700;
      background: rgba(240,180,41,0.15); color: var(--gold);
      padding: 2px 7px; border-radius: 6px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── Timeline ─────────────────────────────────────────────── */
    .timeline-wrap {
      flex: 1; display: flex; overflow: hidden; position: relative;
    }
    .tl-scroll {
      flex: 1; display: flex; overflow-y: auto; overflow-x: hidden;
      scroll-behavior: smooth;
    }
    .tl-scroll::-webkit-scrollbar { width: 4px; }
    .tl-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

    /* Time column */
    .time-col {
      width: var(--tc-w); min-width: var(--tc-w); flex-shrink: 0;
      position: sticky; left: 0; background: var(--cream);
      z-index: 10;
    }
    .time-label {
      height: var(--slot-h);
      display: flex; align-items: flex-start; justify-content: flex-end;
      padding: 0 8px 0 0;
      font-size: 0.65rem; color: var(--muted);
      transform: translateY(-0.5em);
      user-select: none;
    }
    .time-label.half { visibility: hidden; }

    /* Day column */
    .day-col {
      flex: 1; position: relative; min-width: 0;
    }
    .slot-row {
      height: var(--slot-h);
      border-bottom: 1px solid rgba(1,30,92,0.04);
      cursor: pointer; transition: background 0.1s;
      position: relative;
    }
    .slot-row.hour-start { border-bottom-color: rgba(1,30,92,0.09); }
    .slot-row:hover { background: rgba(240,180,41,0.04); }
    .slot-row.drag-over { background: rgba(240,180,41,0.1); }

    /* Now line */
    .now-wrap {
      position: absolute; left: 0; right: 0; z-index: 8;
      pointer-events: none; display: flex; align-items: center;
    }
    .now-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--now); flex-shrink: 0;
      margin-left: -5px;
    }
    .now-line {
      flex: 1; height: 2px; background: var(--now); opacity: 0.8;
    }
    .now-time {
      font-size: 0.65rem; font-weight: 700; color: var(--now);
      white-space: nowrap; padding: 0 4px;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Blocks */
    .block-el {
      position: absolute; left: 3px; right: 3px;
      border-radius: 9px; padding: 6px 9px;
      cursor: pointer; z-index: 5;
      overflow: hidden; transition: opacity 0.15s, transform 0.1s;
      display: flex; flex-direction: column;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .block-el:hover { opacity: 0.88; transform: scale(1.01); }
    .block-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      line-height: 1.3;
    }
    .block-time {
      font-size: 0.67rem; opacity: 0.75;
      margin-top: 2px; white-space: nowrap; overflow: hidden;
    }
    .block-del {
      position: absolute; top: 4px; right: 6px;
      font-size: 0.85rem; opacity: 0;
      transition: opacity 0.15s; cursor: pointer; line-height: 1;
    }
    .block-el:hover .block-del { opacity: 0.65; }
    .block-del:hover { opacity: 1 !important; }

    /* Spending strip */
    .spend-col {
      width: var(--sc-w); min-width: var(--sc-w); flex-shrink: 0;
      position: relative;
      border-left: 1px solid var(--border);
    }
    .spend-dot {
      position: absolute; left: 50%;
      transform: translateX(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700;
      cursor: pointer; z-index: 6;
      transition: transform 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .spend-dot:hover { transform: translateX(-50%) scale(1.2); }
    .spend-dot.impulse { background: #e07a5f; color: white; }
    .spend-dot.planned { background: #059669; color: white; }
    .spend-dot.neutral { background: #94a3b8; color: white; }
    .spend-hdr {
      position: sticky; top: 0;
      padding: 4px 0; text-align: center;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted);
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }

    /* Tooltip */
    .spend-tip {
      position: fixed; z-index: 100;
      background: var(--navy); color: white;
      padding: 6px 10px; border-radius: 8px;
      font-size: 0.75rem; line-height: 1.4;
      max-width: 180px; pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .day-footer {
      height: 48px; flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--cream);
      display: flex; align-items: center;
      padding: 0 1rem; gap: 1.5rem;
    }
    .footer-stat {
      display: flex; align-items: center; gap: 0.4rem;
    }
    .footer-stat-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem; font-weight: 700; color: var(--navy);
    }
    .footer-stat-lbl {
      font-size: 0.72rem; color: var(--muted);
    }
    .footer-divider {
      width: 1px; height: 20px; background: var(--border);
    }
    .footer-tasks-btn {
      margin-left: auto;
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; font-weight: 600; color: var(--navy);
      background: none; border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0.3rem 0.7rem;
      cursor: pointer; transition: all 0.15s;
    }
    .footer-tasks-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── FAB ─────────────────────────────────────────────────── */
    .fab {
      position: fixed;
      right: 1.25rem;
      bottom: calc(60px + 1.25rem);
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--navy); color: white;
      border: none; font-size: 1.5rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 50;
      box-shadow: 0 4px 18px rgba(1,30,92,0.3);
      transition: transform 0.15s, background 0.15s;
    }
    .fab:hover { transform: scale(1.08); background: #02287a; }
    @media (min-width: 900px) {
      .fab { bottom: 1.25rem; }
    }

    /* ── Task sheet ──────────────────────────────────────────── */
    .sheet-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(1,15,48,0.4);
    }
    .sheet-overlay.open { display: block; }
    .task-sheet {
      position: absolute; bottom: 60px; left: 0; right: 0;
      background: white; border-radius: 16px 16px 0 0;
      max-height: 65vh; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.28s ease;
    }
    .sheet-overlay.open .task-sheet { transform: translateY(0); }
    @media (min-width: 900px) {
      .task-sheet {
        bottom: 0; left: auto; right: 0;
        width: 320px; height: 100%;
        border-radius: 0; max-height: none;
        transform: translateX(100%);
        top: 0;
      }
      .sheet-overlay.open .task-sheet { transform: translateX(0); }
    }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(0,0,0,0.12); margin: 10px auto 0;
      flex-shrink: 0;
    }
    @media (min-width: 900px) { .sheet-handle { display: none; } }
    .sheet-hdr {
      padding: 0.75rem 1.25rem 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 0.9rem; color: var(--navy);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sheet-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.2rem; line-height: 1;
    }
    .sheet-list {
      flex: 1; overflow-y: auto; padding: 0.75rem 1rem;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .task-chip {
      padding: 0.55rem 0.7rem;
      background: var(--cream); border-radius: 9px;
      border: 1.5px solid var(--border);
      cursor: grab; user-select: none;
      transition: all 0.15s; display: flex;
      align-items: flex-start; gap: 0.5rem;
      font-size: 0.82rem; line-height: 1.35;
    }
    .task-chip:hover {
      border-color: var(--gold);
      box-shadow: 0 2px 8px rgba(240,180,41,0.12);
    }
    .task-chip.dragging { opacity: 0.35; }
    .chip-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0; margin-top: 4px;
    }
    .chip-body { flex: 1; min-width: 0; }
    .chip-name {
      font-weight: 500; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .chip-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .chip-due { font-size: 0.67rem; padding: 1px 5px; border-radius: 4px;
      background: rgba(240,180,41,0.12); color: var(--gold); font-weight: 600; }
    .chip-due.overdue { background: rgba(224,122,95,0.12); color: #e07a5f; }

    /* ── Block modal ─────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(1,15,48,0.45);
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px;
      padding: 1.4rem; width: 100%; max-width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    }
    .modal-hdr {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--navy);
      margin-bottom: 1.1rem;
    }
    .form-group { margin-bottom: 0.85rem; }
    .form-label {
      font-size: 0.75rem; font-weight: 600;
      color: var(--muted); display: block; margin-bottom: 0.3rem;
    }
    .form-input, .form-select {
      width: 100%; padding: 0.55rem 0.75rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      color: var(--text); background: var(--cream); outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-row { display: flex; gap: 0.6rem; }
    .form-row .form-group { flex: 1; }
    .modal-actions {
      display: flex; gap: 0.5rem; margin-top: 1.25rem;
      align-items: center;
    }
    .btn-primary {
      flex: 1; padding: 0.6rem;
      background: var(--navy); color: white;
      border: none; border-radius: 9px; font-weight: 600;
      font-size: 0.88rem; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #02287a; }
    .btn-ghost {
      padding: 0.6rem 0.9rem;
      background: none; border: 1.5px solid var(--border);
      border-radius: 9px; font-size: 0.88rem;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger {
      padding: 0.6rem 0.9rem;
      background: none; border: 1.5px solid rgba(224,122,95,0.3);
      border-radius: 9px; font-size: 0.88rem;
      color: #e07a5f; cursor: pointer; transition: all 0.15s;
    }
    .btn-danger:hover { background: rgba(224,122,95,0.08); }

    /* Empty state */
    .empty-day {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; color: var(--muted); font-size: 0.85rem;
      pointer-events: none;
    }
    .empty-day-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    /* ── Google Calendar connect bar ─────────────────────────────── */
    .gcal-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 1rem; background: rgba(1,30,92,0.03);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem; color: var(--muted);
      flex-shrink: 0;
    }
    .gcal-bar-icon { font-size: 1rem; flex-shrink: 0; }
    .gcal-bar-text { flex: 1; }
    .gcal-btn {
      padding: 4px 12px; border-radius: 99px;
      border: 1.5px solid var(--border);
      background: white; font-size: 0.75rem; font-weight: 600;
      color: var(--navy); cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .gcal-btn:hover { border-color: #4285F4; color: #4285F4; }
    .gcal-btn.syncing { opacity: 0.6; pointer-events: none; }
    .gcal-dot { width: 7px; height: 7px; border-radius: 50%; background: #4285F4; flex-shrink: 0; }
  </style>
</head>
<body>

<script src="/shared-nav.js"></script>

<!-- Calendar root -->
<div class="cal-root">

  <!-- Header -->
  <header class="cal-hdr" id="calHdr">
    <div class="hdr-top">
      <span class="month-label" id="monthLabel"></span>
      <div class="hdr-nav">
        <button class="hdr-nav-btn" id="prevDay" title="Previous day">‹</button>
        <button class="today-pill" id="todayBtn">Today</button>
        <button class="hdr-nav-btn" id="nextDay" title="Next day">›</button>
      </div>
    </div>
    <div class="week-strip" id="weekStrip"></div>
    <div class="day-headline" id="dayHeadline"></div>
  </header>

  <!-- Google Calendar bar (shown after page load) -->
  <div class="gcal-bar" id="gcalBar" style="display:none">
    <span class="gcal-bar-icon" id="gcalIcon">📅</span>
    <span class="gcal-bar-text" id="gcalBarText">Sync Google Calendar</span>
    <button class="gcal-btn" id="gcalBtn">Connect</button>
  </div>

  <!-- Timeline -->
  <div class="timeline-wrap">
    <div class="tl-scroll" id="tlScroll">
      <div class="time-col" id="timeCol"></div>
      <div class="day-col" id="dayCol">
        <!-- slot grid -->
        <div id="slotsLayer"></div>
        <!-- now line -->
        <div class="now-wrap" id="nowWrap" style="display:none">
          <div class="now-dot"></div>
          <div class="now-line"></div>
          <div class="now-time" id="nowTime"></div>
        </div>
        <!-- blocks -->
        <div id="blocksLayer"></div>
        <!-- empty state -->
        <div class="empty-day" id="emptyDay" style="display:none">
          <div class="empty-day-icon">📅</div>
          <div>Tap a time slot to add a block</div>
        </div>
      </div>
      <div class="spend-col" id="spendCol">
        <div class="spend-hdr">$</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="day-footer" id="dayFooter">
    <div class="footer-stat">
      <span class="footer-stat-val" id="footerHours">0h</span>
      <span class="footer-stat-lbl">planned</span>
    </div>
    <div class="footer-divider"></div>
    <div class="footer-stat">
      <span class="footer-stat-val" id="footerBlocks">0</span>
      <span class="footer-stat-lbl">blocks</span>
    </div>
    <div class="footer-divider"></div>
    <div class="footer-stat">
      <span class="footer-stat-val" id="footerSpend">$0</span>
      <span class="footer-stat-lbl">today</span>
    </div>
    <button class="footer-tasks-btn" id="footerTasksBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
      Tasks
    </button>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab" aria-label="Add time block">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Task sheet -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="task-sheet" id="taskSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span>Tasks to Schedule</span>
      <button class="sheet-close" id="sheetClose">×</button>
    </div>
    <div class="sheet-list" id="sheetList"></div>
  </div>
</div>

<!-- Block modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-hdr" id="modalHdr">Add Time Block</div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="blockTitle" placeholder="What are you blocking time for?">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start</label>
        <input type="time" class="form-input" id="blockStart">
      </div>
      <div class="form-group">
        <label class="form-label">End</label>
        <input type="time" class="form-input" id="blockEnd">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Value / Category</label>
      <select class="form-select" id="blockValue">
        <option value="">— Uncategorized —</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="modalDelete" style="display:none">Delete</button>
      <button class="btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn-primary" id="modalSave">Save Block</button>
    </div>
  </div>
</div>

<!-- Expense tooltip -->
<div class="spend-tip" id="spendTip" style="display:none"></div>

<script>
/* ================================================================
   FocusLedger — Day Planner (Structured.app-inspired)
   Day-primary timeline view with spending overlay
   ================================================================ */

const TOKEN = localStorage.getItem('fl_token');
if (!TOKEN) window.location.href = '/login';

// ── Constants ────────────────────────────────────────────────────
const SLOT_H      = 64;   // px per 30-min slot
const DAY_START   = 6;    // 6am
const DAY_END     = 23;   // 11pm
const TOTAL_SLOTS = (DAY_END - DAY_START) * 2;

// Value category palette — index maps to value order
const PALETTE = [
  { bg: '#1e40af', fg: '#fff' },
  { bg: '#0d9488', fg: '#fff' },
  { bg: '#d97706', fg: '#fff' },
  { bg: '#9333ea', fg: '#fff' },
  { bg: '#dc2626', fg: '#fff' },
  { bg: '#059669', fg: '#fff' },
  { bg: '#0284c7', fg: '#fff' },
  { bg: '#db2777', fg: '#fff' },
];
const NEUTRAL = { bg: '#64748b', fg: '#fff' };

// ── State ────────────────────────────────────────────────────────
let currentDate  = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
let blocks       = [];
let tasks        = [];
let values       = [];
let expenses     = [];
let editingId    = null;
let pendingSlot  = null;  // { dateStr, slot, taskId } when creating via click or task drop

// ── API ──────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (r.status === 401) { window.location.href = '/login'; return null; }
  return r.json();
}

// ── Date helpers ─────────────────────────────────────────────────
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function getMonday(d) {
  const date = new Date(d), day = date.getDay();
  date.setDate(date.getDate() - day + (day === 0 ? -6 : 1));
  date.setHours(0,0,0,0); return date;
}
function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function slotToTime(s) {
  const min = DAY_START * 60 + s * 30;
  return `${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;
}
function timeToMinutes(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function minutesToTimeStr(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function formatTimeDisplay(t) {
  const [h,m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  const hr = h%12 || 12;
  return m === 0 ? `${hr}${ampm}` : `${hr}:${String(m).padStart(2,'0')}${ampm}`;
}
function formatTimeRange(s, e) { return `${formatTimeDisplay(s)} – ${formatTimeDisplay(e)}`; }

// ── Color helpers ────────────────────────────────────────────────
function valueColor(valueId) {
  if (!valueId) return NEUTRAL;
  const idx = values.findIndex(v => v.id === valueId || v.id === Number(valueId));
  return idx >= 0 ? PALETTE[idx % PALETTE.length] : NEUTRAL;
}

// ── Data loading ─────────────────────────────────────────────────
async function loadAll() {
  const dateStr   = toDateStr(currentDate);
  const monday    = getMonday(currentDate);
  const mondayStr = toDateStr(monday);

  try {
    const [blocksRes, tasksRes, valuesRes, expRes] = await Promise.all([
      api('GET', `/time-blocks?date=${mondayStr}`),
      api('GET', '/time-blocks/tasks'),
      api('GET', '/values'),
      api('GET', `/expenses?period=custom&start=${dateStr}&end=${dateStr}`)
    ]);
    if (blocksRes?.success)  blocks   = blocksRes.time_blocks || [];
    if (tasksRes?.success)   tasks    = tasksRes.tasks || [];
    if (valuesRes?.success)  values   = valuesRes.values || [];
    if (expRes?.success)     expenses = expRes.expenses || [];
  } catch (e) { console.error('[DayPlan] Load failed:', e); }

  render();
}

async function reloadDay() {
  const dateStr   = toDateStr(currentDate);
  const monday    = getMonday(currentDate);
  const mondayStr = toDateStr(monday);
  try {
    const [blocksRes, expRes] = await Promise.all([
      api('GET', `/time-blocks?date=${mondayStr}`),
      api('GET', `/expenses?period=custom&start=${dateStr}&end=${dateStr}`)
    ]);
    if (blocksRes?.success) blocks   = blocksRes.time_blocks || [];
    if (expRes?.success)    expenses = expRes.expenses || [];
  } catch(e) {}
  render();
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  renderHeader();
  renderTimeCol();
  renderSlots();
  renderBlocks();
  renderSpending();
  renderNowLine();
  renderFooter();
  populateValueSelect();
  if (isToday(currentDate)) scrollToNow();
}

function renderHeader() {
  const monday = getMonday(currentDate);
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  document.getElementById('monthLabel').textContent =
    currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  // Week strip
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const day = addDays(monday, i);
    const dayBlocks = blocks.filter(b => (b.block_date||'').slice(0,10) === toDateStr(day));
    const pill = document.createElement('button');
    pill.className = 'day-pill' +
      (isSameDay(day, currentDate) ? ' active' : '') +
      (isToday(day) ? ' today' : '');
    pill.innerHTML =
      `<span class="pill-name">${DAYS[i]}</span>` +
      `<span class="pill-num">${day.getDate()}</span>` +
      (dayBlocks.length ? `<span class="pill-dot"></span>` : '<span style="height:4px"></span>');
    pill.addEventListener('click', () => { currentDate = day; render(); });
    strip.appendChild(pill);
  }

  // Day headline
  const hl = document.getElementById('dayHeadline');
  const opts = { weekday: 'long', month: 'long', day: 'numeric' };
  const label = currentDate.toLocaleDateString('en-US', opts);
  hl.innerHTML = label + (isToday(currentDate) ? ' <span class="today-tag">Today</span>' : '');
}

function renderTimeCol() {
  const col = document.getElementById('timeCol');
  col.innerHTML = '';
  col.style.height = `${TOTAL_SLOTS * SLOT_H}px`;
  for (let i = 0; i <= TOTAL_SLOTS; i++) {
    const min = DAY_START * 60 + i * 30;
    const h = Math.floor(min/60), m = min % 60;
    const el = document.createElement('div');
    el.className = 'time-label' + (m === 30 ? ' half' : '');
    if (m === 0) {
      const h12 = h%12 || 12, ampm = h >= 12 ? 'pm' : 'am';
      el.textContent = `${h12}${ampm}`;
    }
    col.appendChild(el);
  }
}

function renderSlots() {
  const layer = document.getElementById('slotsLayer');
  layer.innerHTML = '';
  const dateStr = toDateStr(currentDate);
  layer.style.height = `${TOTAL_SLOTS * SLOT_H}px`;
  for (let s = 0; s < TOTAL_SLOTS; s++) {
    const row = document.createElement('div');
    row.className = 'slot-row' + (s % 2 === 0 ? ' hour-start' : '');
    row.style.cssText = `position:absolute;top:${s*SLOT_H}px;left:0;right:0;height:${SLOT_H}px;`;
    row.addEventListener('click', () => openModal({ dateStr, slot: s }));
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault(); row.classList.remove('drag-over');
      const taskId    = e.dataTransfer.getData('task_id');
      if (!taskId) return; // block reschedule — handled by renderBlocks listener
      const taskTitle = e.dataTransfer.getData('task_title');
      const taskValId = e.dataTransfer.getData('task_value_id');
      openModal({ dateStr, slot: s, taskId, taskTitle, taskValueId: taskValId });
    });
    layer.appendChild(row);
  }
  document.getElementById('dayCol').style.height = `${TOTAL_SLOTS * SLOT_H}px`;
}

function renderBlocks() {
  const layer = document.getElementById('blocksLayer');
  layer.innerHTML = '';
  const dateStr = toDateStr(currentDate);
  const dayBlocks = blocks.filter(b => (b.block_date||'').slice(0,10) === dateStr);

  document.getElementById('emptyDay').style.display = dayBlocks.length ? 'none' : 'block';

  dayBlocks.forEach(block => {
    const startStr = (block.start_time||'00:00').slice(0,5);
    const endStr   = (block.end_time||'00:30').slice(0,5);
    const startMin = timeToMinutes(startStr);
    const endMin   = timeToMinutes(endStr);
    const dayStartMin = DAY_START * 60;
    const top    = Math.max(0, (startMin - dayStartMin) / 30 * SLOT_H);
    const height = Math.max(SLOT_H/2, (endMin - startMin) / 30 * SLOT_H - 3);

    const isGcal = block.source === 'gcal';
    const col = isGcal
      ? { bg: 'rgba(66,133,244,0.12)', fg: '#1a4fa0' }
      : valueColor(block.value_id);

    const el = document.createElement('div');
    el.className = 'block-el' + (isGcal ? ' gcal-block' : '');
    el.dataset.blockId = block.id;
    el.style.cssText = `top:${top}px;height:${height}px;background:${col.bg};color:${col.fg};` +
      (isGcal ? 'border-left:3px solid #4285F4;' : '');
    el.draggable = !isGcal;

    const title = document.createElement('div');
    title.className = 'block-title';
    title.textContent = block.title || block.task_title || block.value_name || 'Time Block';

    const time = document.createElement('div');
    time.className = 'block-time';
    time.textContent = formatTimeRange(startStr, endStr);

    const del = document.createElement('span');
    del.className = 'block-del';
    del.textContent = isGcal ? '↗' : '×';
    del.title = isGcal ? 'Open in Google Calendar' : 'Delete block';
    del.addEventListener('click', async e => {
      e.stopPropagation();
      if (isGcal) return; // GCal blocks are read-only
      if (!confirm('Delete this block?')) return;
      const res = await api('DELETE', `/time-blocks/${block.id}`);
      if (res?.success) reloadDay();
    });

    el.appendChild(title);
    if (height >= SLOT_H) el.appendChild(time);
    el.appendChild(del);

    el.addEventListener('click', e => { if (e.target === del) return; openEditModal(block); });

    // Drag to reschedule
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('block_id', block.id);
      e.dataTransfer.setData('block_duration', endMin - startMin);
      el.style.opacity = '0.35';
    });
    el.addEventListener('dragend', () => { el.style.opacity = ''; });

    layer.appendChild(el);
  });

  // Wire slot drop for block reschedule
  const slots = document.querySelectorAll('#slotsLayer .slot-row');
  slots.forEach((row, s) => {
    row.addEventListener('drop', async e => {
      const blockId  = e.dataTransfer.getData('block_id');
      const duration = parseInt(e.dataTransfer.getData('block_duration')) || 60;
      if (!blockId) return;
      const newStart = slotToTime(s);
      const newEnd   = minutesToTimeStr(timeToMinutes(newStart) + duration);
      await api('PATCH', `/time-blocks/${blockId}`, {
        start_time: newStart, end_time: newEnd, block_date: toDateStr(currentDate)
      });
      reloadDay();
    });
  });
}

function renderSpending() {
  const col = document.getElementById('spendCol');
  // Remove existing dots (keep header)
  col.querySelectorAll('.spend-dot').forEach(d => d.remove());
  col.style.height = `${TOTAL_SLOTS * SLOT_H + 24}px`;

  expenses.forEach(exp => {
    if (!exp.created_at) return;
    const d = new Date(exp.created_at);
    const h = d.getHours(), m = d.getMinutes();
    if (h < DAY_START || h >= DAY_END) return;

    const topPx = 24 + (h - DAY_START) * 2 * SLOT_H + (m / 30) * SLOT_H;
    const cls   = exp.is_impulse === true  ? 'impulse'
                : exp.is_impulse === false ? 'planned' : 'neutral';
    const amount = parseFloat(exp.amount || 0);

    const dot = document.createElement('div');
    dot.className = `spend-dot ${cls}`;
    dot.style.top = `${topPx}px`;
    dot.textContent = amount >= 100 ? `$${Math.round(amount)}` : `$${amount.toFixed(0)}`;
    dot.title = `${exp.description || exp.category_name || 'Expense'} — $${amount.toFixed(2)}`;

    dot.addEventListener('mouseenter', e => showSpendTip(e, exp));
    dot.addEventListener('mouseleave', () => {
      document.getElementById('spendTip').style.display = 'none';
    });

    col.appendChild(dot);
  });
}

function showSpendTip(e, exp) {
  const tip = document.getElementById('spendTip');
  const amount = parseFloat(exp.amount || 0);
  tip.innerHTML =
    `<strong>$${amount.toFixed(2)}</strong><br>` +
    `${exp.description || exp.category_name || 'Expense'}` +
    (exp.is_impulse === true ? '<br><span style="color:#f0b429">⚡ impulse</span>' : '');
  tip.style.display = 'block';
  tip.style.left = `${e.clientX - 100}px`;
  tip.style.top  = `${e.clientY - 72}px`;
}

function renderNowLine() {
  const wrap = document.getElementById('nowWrap');
  if (!isToday(currentDate)) { wrap.style.display = 'none'; return; }
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  if (h < DAY_START || h >= DAY_END) { wrap.style.display = 'none'; return; }
  const topPx = (h - DAY_START) * 2 * SLOT_H + (m / 30) * SLOT_H;
  wrap.style.display = 'flex';
  wrap.style.top = `${topPx}px`;
  document.getElementById('nowTime').textContent = formatTimeDisplay(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
}

function renderFooter() {
  const dateStr  = toDateStr(currentDate);
  const dayBlocks = blocks.filter(b => (b.block_date||'').slice(0,10) === dateStr);
  let totalMin = 0;
  dayBlocks.forEach(b => {
    totalMin += timeToMinutes((b.end_time||'00:00').slice(0,5)) - timeToMinutes((b.start_time||'00:00').slice(0,5));
  });
  const hrs = Math.floor(totalMin/60), mins = totalMin%60;
  document.getElementById('footerHours').textContent = hrs > 0
    ? (mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`)
    : (mins > 0 ? `${mins}m` : '0h');
  document.getElementById('footerBlocks').textContent = dayBlocks.length;

  const totalSpend = expenses.reduce((s, e) => s + parseFloat(e.amount || 0), 0);
  document.getElementById('footerSpend').textContent = totalSpend > 0
    ? `$${totalSpend.toFixed(0)}` : '$0';
}

function populateValueSelect() {
  const sel = document.getElementById('blockValue');
  const current = sel.value;
  sel.innerHTML = '<option value="">— Uncategorized —</option>';
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id;
    opt.textContent = v.name;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

function scrollToNow() {
  if (!isToday(currentDate)) return;
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  if (h < DAY_START) return;
  const topPx = (h - DAY_START) * 2 * SLOT_H + (m / 30) * SLOT_H;
  const scroll = document.getElementById('tlScroll');
  scroll.scrollTop = Math.max(0, topPx - scroll.clientHeight / 3);
}

// ── Now line tick ─────────────────────────────────────────────────
setInterval(() => {
  if (isToday(currentDate)) renderNowLine();
}, 60000);

// ── Modal ─────────────────────────────────────────────────────────
function openModal({ dateStr, slot, taskId, taskTitle, taskValueId } = {}) {
  editingId = null;
  pendingSlot = { dateStr: dateStr || toDateStr(currentDate), slot, taskId: taskId || null };

  document.getElementById('modalHdr').textContent = 'Add Time Block';
  document.getElementById('blockTitle').value = taskTitle || '';
  document.getElementById('blockValue').value = taskValueId || '';
  document.getElementById('modalDelete').style.display = 'none';

  if (slot != null) {
    document.getElementById('blockStart').value = slotToTime(slot);
    document.getElementById('blockEnd').value   = slotToTime(Math.min(slot + 2, TOTAL_SLOTS - 1));
  } else {
    const now = new Date();
    const rnd = Math.round(now.getMinutes() / 30) * 30;
    const h   = now.getHours() + (rnd >= 60 ? 1 : 0);
    const hh  = String(h % 24).padStart(2,'0');
    const mm  = String(rnd % 60).padStart(2,'0');
    document.getElementById('blockStart').value = `${hh}:${mm}`;
    document.getElementById('blockEnd').value   = `${String((h+1)%24).padStart(2,'0')}:${mm}`;
  }

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('blockTitle').focus(), 100);
}

function openEditModal(block) {
  editingId = block.id;
  pendingSlot = null;

  document.getElementById('modalHdr').textContent = 'Edit Time Block';
  document.getElementById('blockTitle').value = block.title || block.task_title || '';
  document.getElementById('blockStart').value = (block.start_time||'00:00').slice(0,5);
  document.getElementById('blockEnd').value   = (block.end_time||'00:30').slice(0,5);
  document.getElementById('blockValue').value = block.value_id || '';
  document.getElementById('modalDelete').style.display = 'inline-flex';

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('blockTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null; pendingSlot = null;
}

document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('blockTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modalSave').click();
});

document.getElementById('modalSave').addEventListener('click', async () => {
  const title   = document.getElementById('blockTitle').value.trim();
  const start   = document.getElementById('blockStart').value;
  const end     = document.getElementById('blockEnd').value;
  const valueId = document.getElementById('blockValue').value || null;

  if (!title && !valueId) {
    document.getElementById('blockTitle').focus(); return;
  }
  if (!start || !end || start >= end) {
    document.getElementById('blockStart').focus(); return;
  }

  if (editingId) {
    await api('PATCH', `/time-blocks/${editingId}`, { title, start_time: start, end_time: end, value_id: valueId });
  } else {
    const dateStr = pendingSlot?.dateStr || toDateStr(currentDate);
    const body = { title, start_time: start, end_time: end, value_id: valueId, block_date: dateStr };
    if (pendingSlot?.taskId) body.task_id = pendingSlot.taskId;
    await api('POST', '/time-blocks', body);
  }
  closeModal();
  reloadDay();
});

document.getElementById('modalDelete').addEventListener('click', async () => {
  if (!editingId || !confirm('Delete this block?')) return;
  await api('DELETE', `/time-blocks/${editingId}`);
  closeModal(); reloadDay();
});

// ── Task sheet ────────────────────────────────────────────────────
function openTaskSheet() {
  const list = document.getElementById('sheetList');
  list.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);

  if (!tasks.length) {
    list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.82rem">✨ No open tasks</div>';
  } else {
    tasks.forEach(task => {
      const chip = document.createElement('div');
      chip.className = 'task-chip';
      chip.draggable = true;

      let dueBadge = '';
      if (task.due_date) {
        const due = new Date(task.due_date);
        const isOverdue = due < today;
        const label = isOverdue ? 'Overdue' : due.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        dueBadge = `<span class="chip-due${isOverdue?' overdue':''}">${label}</span>`;
      }

      const valColor = valueColor(task.value_id);
      chip.innerHTML =
        `<div class="chip-dot" style="background:${valColor.bg}"></div>` +
        `<div class="chip-body">` +
          `<div class="chip-name">${task.title}</div>` +
          `<div class="chip-meta">${dueBadge}${task.duration_minutes ? ` ${task.duration_minutes}m` : ''}</div>` +
        `</div>`;

      chip.addEventListener('dragstart', e => {
        e.dataTransfer.setData('task_id',       task.id);
        e.dataTransfer.setData('task_title',    task.title);
        e.dataTransfer.setData('task_value_id', task.value_id || '');
        chip.classList.add('dragging');
        closeTaskSheet();
      });
      chip.addEventListener('dragend', () => chip.classList.remove('dragging'));

      list.appendChild(chip);
    });
  }

  document.getElementById('sheetOverlay').classList.add('open');
}

function closeTaskSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
}

document.getElementById('footerTasksBtn').addEventListener('click', openTaskSheet);
document.getElementById('sheetClose').addEventListener('click', closeTaskSheet);
document.getElementById('sheetOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('sheetOverlay')) closeTaskSheet();
});

// ── Navigation ────────────────────────────────────────────────────
document.getElementById('prevDay').addEventListener('click', () => {
  currentDate = addDays(currentDate, -1); loadAll();
});
document.getElementById('nextDay').addEventListener('click', () => {
  currentDate = addDays(currentDate, 1); loadAll();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  currentDate = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
  loadAll();
});
document.getElementById('fab').addEventListener('click', () => openModal());

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (document.getElementById('modalOverlay').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  { currentDate = addDays(currentDate, -1); loadAll(); }
  if (e.key === 'ArrowRight') { currentDate = addDays(currentDate,  1); loadAll(); }
  if (e.key === 't' || e.key === 'T') {
    currentDate = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
    loadAll();
  }
});

// ── Boot ─────────────────────────────────────────────────────────
loadAll();

// ── Google Calendar Integration ───────────────────────────────────
(async function initGcal() {
  const bar    = document.getElementById('gcalBar');
  const btn    = document.getElementById('gcalBtn');
  const icon   = document.getElementById('gcalIcon');
  const text   = document.getElementById('gcalBarText');
  if (!bar || !btn) return;

  async function gcalApi(method, path, body) {
    const opts = { method, headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch('/api/gcal' + path, opts);
    return r.json();
  }

  function setConnected(lastSync) {
    icon.textContent  = '●';
    icon.style.color  = '#4285F4';
    text.textContent  = lastSync
      ? `Google Calendar synced ${new Date(lastSync).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`
      : 'Google Calendar connected';
    btn.textContent = 'Sync now';
    btn.onclick = doSync;
    bar.style.display = 'flex';
  }

  function setDisconnected() {
    icon.textContent = '📅';
    icon.style.color = '';
    text.textContent = 'Sync Google Calendar events to your timeline';
    btn.textContent  = 'Connect';
    btn.onclick = doConnect;
    bar.style.display = 'flex';
  }

  async function doConnect() {
    btn.textContent = 'Opening…';
    btn.classList.add('syncing');
    try {
      const r = await gcalApi('GET', '/auth-url');
      if (r.url) window.location.href = r.url;
      else throw new Error(r.message);
    } catch (e) {
      btn.textContent = 'Connect';
      btn.classList.remove('syncing');
    }
  }

  async function doSync() {
    btn.textContent = 'Syncing…';
    btn.classList.add('syncing');
    try {
      const r = await gcalApi('POST', '/sync');
      if (r.success) {
        setConnected(new Date().toISOString());
        loadAll(); // refresh timeline with GCal events
      } else {
        text.textContent = 'Sync failed — try reconnecting';
        btn.textContent = 'Retry';
        btn.classList.remove('syncing');
      }
    } catch {
      btn.textContent = 'Retry';
      btn.classList.remove('syncing');
    }
  }

  // Check ?gcal= param from OAuth callback
  const urlParams = new URLSearchParams(window.location.search);
  const gcalParam = urlParams.get('gcal');
  if (gcalParam) {
    history.replaceState({}, '', window.location.pathname);
    if (gcalParam === 'connected') {
      // Just connected — do an immediate sync
      setConnected(null);
      btn.onclick = doSync;
      setTimeout(doSync, 500);
    }
  }

  // Load status
  try {
    const status = await gcalApi('GET', '/status');
    if (status.connected) setConnected(status.lastSync);
    else setDisconnected();
  } catch {
    setDisconnected();
  }
})();
</script>
