<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Evening Check-In — FocusLedger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #011e5c;
      --orange:    #c9a84c;
      --orange-dk: #a8892e;
      --cream:     #faf9f7;
      --surface:   #fff;
      --text:      #1a1a1a;
      --muted:     #6b6b6b;
      --border:    #e8e5e0;
      --planned:   #22c55e;
      --planned-bg:#f0fdf4;
      --impulse:   #f59e0b;
      --impulse-bg:#fffbeb;
      --shadow:    0 8px 32px rgba(0,0,0,0.18);
      --spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: white;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

    /* ── Shell ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 500px;
      margin: 0 auto;
      padding:
        env(safe-area-inset-top, 0)
        0
        calc(80px + env(safe-area-inset-bottom, 0));
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem 0.5rem;
      flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.45);
      font-size: 0.85rem; cursor: pointer;
      padding: 0.3rem 0;
      font-family: 'DM Sans', sans-serif;
    }
    .back-btn:hover { color: rgba(255,255,255,0.8); }
    .top-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      color: rgba(255,255,255,0.45);
    }
    .progress-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }
    .top-right { width: 50px; text-align: right; }

    /* ── Card arena ── */
    .arena {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.25rem;
      position: relative;
      overflow: hidden;
    }

    .section-title {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.75rem;
      align-self: flex-start;
    }

    /* ── Card stack ── */
    .stack {
      position: relative;
      width: 100%;
      max-width: 340px;
      height: 186px;
    }

    /* ── Transaction card ── */
    .card {
      position: absolute; inset: 0;
      background: var(--surface);
      border-radius: 18px;
      padding: 1.25rem;
      display: flex; flex-direction: column; gap: 0.4rem;
      cursor: grab;
      will-change: transform;
      overflow: hidden;
    }
    .card:active { cursor: grabbing; }

    @media (prefers-reduced-motion: no-preference) {
      .card { transition: box-shadow 0.15s; }
    }

    /* Swipe background bands */
    .bg-planned {
      position: absolute; inset: 0;
      background: var(--planned-bg);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 1.5rem;
      opacity: 0; transition: opacity 0.2s;
    }
    .bg-impulse {
      position: absolute; inset: 0;
      background: var(--impulse-bg);
      border-radius: 18px;
      display: flex; align-items: center;
      padding-left: 1.5rem;
      opacity: 0; transition: opacity 0.2s;
    }
    .bg-label {
      font-size: 0.85rem; font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.04em;
    }
    .bg-planned .bg-label { color: var(--planned); }
    .bg-impulse .bg-label { color: var(--impulse); }

    .card-inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; height: 100%;
    }
    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between;
    }
    .cat-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(1,30,92,0.07);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .amount {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--text); line-height: 1;
    }
    .merchant { font-size: 1rem; font-weight: 600; color: var(--text); }
    .category { font-size: 0.82rem; color: var(--muted); }

    .card-hints {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: auto;
    }
    .hint-left  { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.4; color: #22c55e; }
    .hint-right { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.4; color: #f59e0b; }

    /* Stacked peek card */
    .card.peek {
      transform: translateY(14px) scale(0.93);
      z-index: 0; opacity: 0.7; pointer-events: none;
    }
    .card.top  { z-index: 2; box-shadow: var(--shadow); }
    .card.gone { opacity: 0; pointer-events: none; z-index: 1; }

    /* Swipe direction indicators */
    .swipe-ind {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      opacity: 0; transition: opacity 0.15s;
      position: absolute; top: 50%; transform: translateY(-50%);
    }
    .swipe-ind.left  { left: 0.25rem; color: var(--planned); }
    .swipe-ind.right { right: 0.25rem; color: var(--impulse); }
    .swipe-ind.active { opacity: 1; }

    /* ── Keyboard hint ── */
    .kb-hint {
      font-size: 0.7rem; color: rgba(255,255,255,0.3);
      text-align: center; margin-top: 0.75rem;
    }

    /* ── Loading ── */
    #loadScreen {
      display: flex; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; color: rgba(255,255,255,0.5); font-size: 0.88rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state {
      display: none; flex-direction: column;
      align-items: center; gap: 1.25rem;
      text-align: center; padding: 2rem 1rem;
    }
    .empty-state.visible { display: flex; }
    .empty-icon { font-size: 3rem; }
    .empty-heading { font-family: 'Space Grotesk', sans-serif; font-size: 1.35rem; font-weight: 700; color: rgba(255,255,255,0.9); }
    .empty-sub { font-size: 0.9rem; color: rgba(255,255,255,0.5); line-height: 1.5; max-width: 280px; }
    .btn-empty {
      padding: 0.85rem 2rem; background: var(--orange); color: white;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-empty:hover { background: var(--orange-dk); }

    /* ── Bottom action bar ── */
    .action-bar {
      position: fixed;
      bottom: calc(60px + env(safe-area-inset-bottom, 0px));
      left: 0; right: 0;
      max-width: 500px; margin: 0 auto;
      padding: 0.75rem 1.25rem;
      display: flex; gap: 0.75rem; z-index: 50;
    }
    .btn {
      flex: 1; padding: 0.85rem 1rem;
      border: none; border-radius: 14px;
      font-size: 0.95rem; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: transform 0.1s, opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-planned { background: #dcfce7; color: #16a34a; }
    .btn-impulse { background: #fef3c7; color: #d97706; }

    /* ── Completion screen ── */
    #doneScreen {
      display: none; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem 1.5rem; gap: 1.25rem;
    }
    #doneScreen.visible { display: flex; }
    .done-icon { font-size: 3rem; }
    .done-heading { font-family: 'Space Grotesk', sans-serif; font-size: 1.7rem; font-weight: 700; line-height: 1.2; }
    .done-sub { font-size: 0.92rem; color: rgba(255,255,255,0.55); line-height: 1.55; max-width: 300px; }

    .stats-row { display: flex; gap: 1rem; margin: 0.25rem 0; }
    .stat-chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 0.6rem 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
      min-width: 80px;
    }
    .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; }
    .stat-lbl { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.5; }
    .stat-chip.planned .stat-num { color: #4ade80; }
    .stat-chip.impulse .stat-num { color: #fbbf24; }
    .stat-chip.total   .stat-num { color: white; }

    .done-btn {
      padding: 0.95rem 2rem; background: var(--orange); color: white;
      border: none; border-radius: 14px;
      font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .done-btn:hover { background: var(--orange-dk); }

    /* ── Swipe-off keyframes ── */
    @media (prefers-reduced-motion: no-preference) {
      @keyframes swipeLeft  { to { transform: translateX(-150%) rotate(-18deg); opacity: 0; } }
      @keyframes swipeRight { to { transform: translateX(150%)  rotate(18deg);  opacity: 0; } }
      @keyframes riseUp {
        from { transform: translateY(14px) scale(0.93); opacity: 0.7; }
        to   { transform: translateY(0) scale(1);       opacity: 1; }
      }
      .card.sliding-left  { animation: swipeLeft  0.38s var(--spring) forwards; pointer-events: none; }
      .card.sliding-right { animation: swipeRight 0.38s var(--spring) forwards; pointer-events: none; }
      .card.rising        { animation: riseUp     0.3s  var(--spring) forwards; }
    }

    /* ── Accessibility ── */
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>

<div class="shell">

  <div class="top-bar">
    <button class="back-btn" id="backBtn" aria-label="Go back">← Back</button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:0.15rem">
      <span class="top-title">Today's Spending</span>
      <span class="progress-label" id="progressLabel" aria-live="polite"></span>
    </div>
    <div class="top-right"></div>
  </div>

  <!-- Screen reader live region -->
  <div id="srLive" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <!-- Loading -->
  <div id="loadScreen" role="status" aria-label="Loading today's spending">
    <div class="spinner"></div>
    <span>Loading today's spending…</span>
  </div>

  <!-- Card arena -->
  <div class="arena" id="arena" style="display:none;">
    <div class="section-title">Swipe to classify — left planned · right impulse</div>

    <div class="stack" id="stack" aria-label="Transaction swipe cards" role="list">
      <div class="swipe-ind left"  id="indLeft"  aria-hidden="true"><span>←</span> Planned</div>
      <div class="swipe-ind right" id="indRight" aria-hidden="true">Impulse <span>→</span></div>
    </div>

    <div class="kb-hint" id="kbHint" aria-hidden="true">← → arrow keys to classify</div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" role="status">
      <div class="empty-icon" aria-hidden="true">🌙</div>
      <div class="empty-heading">All quiet today</div>
      <div class="empty-sub">No new spending to review.</div>
      <button class="btn-empty" id="btnEmptyDone" type="button">Back to Money</button>
    </div>
  </div>

  <!-- Completion -->
  <div id="doneScreen" role="status">
    <div class="done-icon" aria-hidden="true">✨</div>
    <div class="done-heading">You're done for today.</div>
    <div class="done-sub" id="doneSub">Here's what you logged.</div>
    <div class="stats-row">
      <div class="stat-chip total">
        <div class="stat-num" id="sTotal">0</div>
        <div class="stat-lbl">Reviewed</div>
      </div>
      <div class="stat-chip planned">
        <div class="stat-num" id="sPlanned">0</div>
        <div class="stat-lbl">Planned</div>
      </div>
      <div class="stat-chip impulse">
        <div class="stat-num" id="sImpulse">0</div>
        <div class="stat-lbl">Impulse</div>
      </div>
    </div>
    <a href="/app/money" class="done-btn">See breakdown →</a>
  </div>

</div>

<!-- Bottom buttons (shown only while swiping) -->
<div class="action-bar" id="actionBar" style="display:none;">
  <button class="btn btn-planned" id="btnPlanned" type="button" aria-label="Mark as planned">← Planned</button>
  <button class="btn btn-impulse" id="btnImpulse" type="button" aria-label="Mark as impulse">Impulse →</button>
</div>

<script>
(function() {
  'use strict';

  // ── Auth gate ──────────────────────────────────────────────────────────────
  var token = localStorage.getItem('fl_token');
  if (!token) { window.location.href = '/login'; return; }

  // ── State ─────────────────────────────────────────────────────────────────
  var txns       = [];
  var idx        = 0;
  var stats      = { planned: 0, impulse: 0 };
  var animating  = false;
  var THRESHOLD  = 100;
  var isDragging = false, ox = 0, oy = 0, dx = 0, dy = 0;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function el(id) { return document.getElementById(id); }

  function announce(msg) {
    var a = el('srLive');
    a.textContent = '';
    void a.offsetWidth;
    a.textContent = msg;
  }

  function authFetch(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ Authorization: 'Bearer ' + token }, opts.headers || {});
    return fetch(url, opts);
  }

  function fmtCents(c) {
    return '$' + ((parseInt(c, 10) || 0) / 100).toFixed(2);
  }

  function catEmoji(cat) {
    if (!cat) return '💳';
    var lower = cat.toLowerCase();
    var map = {
      food:'🍽️',restaurant:'🍽️',coffee:'☕',bar:'🍸',
      travel:'✈️',hotel:'🏨',transport:'🚗',gas:'⛽',
      grocery:'🛒',supermarket:'🛒',shop:'🛍️',amazon:'📦',
      entertainment:'🎬',music:'🎵',game:'🎮',
      health:'💊',pharmacy:'💊',doctor:'🏥',
      utility:'⚡',subscription:'📱',software:'📱',
    };
    for (var k in map) { if (lower.indexOf(k) !== -1) return map[k]; }
    return '💳';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  function boot() {
    authFetch('/api/v1/check-in/evening/spending')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        txns = data.transactions || [];
        showArena();
      })
      .catch(function() { txns = []; showArena(); });
  }

  function showArena() {
    el('loadScreen').style.display = 'none';
    el('arena').style.display = 'flex';

    if (txns.length === 0) {
      el('emptyState').classList.add('visible');
      el('stack').style.display = 'none';
      el('actionBar').style.display = 'none';
      el('kbHint').style.display = 'none';
      announce('No new spending to review today.');
      return;
    }

    el('emptyState').classList.remove('visible');
    el('stack').style.display = '';
    el('actionBar').style.display = 'flex';
    el('kbHint').style.display = '';
    idx = 0;
    renderStack();
    updateProgress();
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderStack() {
    var stack = el('stack');
    // Remove old cards but keep indicators
    var cards = stack.querySelectorAll('.card');
    for (var i = 0; i < cards.length; i++) { stack.removeChild(cards[i]); }

    var peekIdx = idx + 1;

    // Render from back to front
    for (var j = peekIdx + 1; j >= idx; j--) {
      if (j >= txns.length) continue;
      var card = buildCard(txns[j]);
      if (j === peekIdx) {
        card.classList.add('peek');
      } else if (j === idx) {
        card.classList.add('top');
        attachDrag(card);
        announce(
          'Card ' + (idx + 1) + ' of ' + txns.length + ': ' +
          (txns[j].merchant || 'Unknown') + ', ' + fmtCents(txns[j].amount) +
          '. Left for planned, right for impulse.'
        );
      } else {
        card.classList.add('gone');
      }
      stack.appendChild(card);
    }
  }

  function buildCard(t) {
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = t.id;
    card.setAttribute('role', 'listitem');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', (t.merchant || 'Unknown') + ', ' + fmtCents(t.amount));

    var emoji = catEmoji(t.category);
    var cat   = t.category || 'Purchase';

    card.innerHTML =
      '<div class="bg-planned"><span class="bg-label">✓ Planned</span></div>' +
      '<div class="bg-impulse"><span class="bg-label">Impulse ✗</span></div>' +
      '<div class="card-inner">' +
        '<div class="card-top">' +
          '<div class="cat-icon" aria-hidden="true">' + emoji + '</div>' +
          '<div class="amount">' + fmtCents(t.amount) + '</div>' +
        '</div>' +
        '<div class="merchant">' + esc(t.merchant || 'Unknown merchant') + '</div>' +
        '<div class="category">' + esc(cat) + '</div>' +
        '<div class="card-hints" aria-hidden="true">' +
          '<span class="hint-left">← Planned</span>' +
          '<span class="hint-right">Impulse →</span>' +
        '</div>' +
      '</div>';

    return card;
  }

  // ── Drag handlers (touch + mouse, cleanly separated) ──────────────────────
  function attachDrag(card) {
    // Touch
    card.addEventListener('touchstart', onTouchStart, { passive: true });
    card.addEventListener('touchmove',  onTouchMove,  { passive: false });
    card.addEventListener('touchend',   onTouchEnd,   { passive: true });

    // Mouse (desktop testing)
    card.addEventListener('mousedown', onMouseDown);
  }

  function onTouchStart(e) {
    isDragging = true;
    ox = e.touches[0].clientX;
    oy = e.touches[0].clientY;
    dx = 0; dy = 0;
  }
  function onTouchMove(e) {
    if (!isDragging) return;
    dx = e.touches[0].clientX - ox;
    dy = e.touches[0].clientY - oy;
    if (Math.abs(dx) > Math.abs(dy)) {
      e.preventDefault();
      applyDrag(dx);
    }
  }
  function onTouchEnd() {
    if (!isDragging) return;
    isDragging = false;
    settle();
  }

  function onMouseDown(e) {
    isDragging = true;
    ox = e.clientX; oy = e.clientY;
    dx = 0; dy = 0;

    function onMove(ev) {
      if (!isDragging) return;
      dx = ev.clientX - ox;
      dy = ev.clientY - oy;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) applyDrag(dx);
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (!isDragging) return;
      isDragging = false;
      settle();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }

  function applyDrag(delta) {
    var top = el('stack').querySelector('.card.top');
    if (!top) return;
    var rot = delta * 0.06;
    top.style.transition = '';
    top.style.transform  = 'translateX(' + delta + 'px) rotate(' + rot + 'deg)';

    var bgP = top.querySelector('.bg-planned');
    var bgI = top.querySelector('.bg-impulse');
    var pct = Math.min(Math.abs(delta) / THRESHOLD, 1);

    if (delta < 0) {
      if (bgP) bgP.style.opacity = pct;
      if (bgI) bgI.style.opacity = 0;
      el('indLeft').classList.toggle('active', pct > 0.3);
      el('indRight').classList.remove('active');
    } else {
      if (bgP) bgP.style.opacity = 0;
      if (bgI) bgI.style.opacity = pct;
      el('indRight').classList.toggle('active', pct > 0.3);
      el('indLeft').classList.remove('active');
    }
  }

  function settle() {
    var top = el('stack').querySelector('.card.top');
    if (!top) return;
    if (dx < -THRESHOLD) {
      commit('planned', top);
    } else if (dx > THRESHOLD) {
      commit('impulse', top);
    } else {
      // Snap back
      top.style.transition = 'transform 0.35s var(--spring)';
      top.style.transform  = '';
      resetInds();
      resetBgs(top);
    }
    dx = 0; dy = 0;
  }

  function resetInds() {
    el('indLeft').classList.remove('active');
    el('indRight').classList.remove('active');
  }
  function resetBgs(card) {
    var bgP = card.querySelector('.bg-planned');
    var bgI = card.querySelector('.bg-impulse');
    if (bgP) bgP.style.opacity = 0;
    if (bgI) bgI.style.opacity = 0;
  }

  // ── Classify + animate ────────────────────────────────────────────────────
  function commit(classification, cardEl) {
    if (animating) return;
    animating = true;

    var txnId = cardEl.dataset.id;
    cardEl.classList.add(classification === 'planned' ? 'sliding-left' : 'sliding-right');

    stats.total = (stats.total || 0) + 1;
    stats[classification]++;

    if (navigator.vibrate) navigator.vibrate(30);

    postClassify(txnId, classification);

    setTimeout(function() {
      idx++;
      animating = false;
      if (idx >= txns.length) {
        showDone();
      } else {
        updateProgress();
        renderStack();
      }
    }, 380);
  }

  function postClassify(txnId, classification) {
    authFetch('/api/v1/check-in/evening/spending/' + txnId + '/classify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classification: classification }),
    }).catch(function(err) {
      console.warn('[evening-checkin] classify error:', err);
    });
  }

  // ── Button handlers ───────────────────────────────────────────────────────
  el('btnPlanned').addEventListener('click', function() {
    var top = el('stack').querySelector('.card.top');
    if (!top || animating) return;
    commit('planned', top);
  });
  el('btnImpulse').addEventListener('click', function() {
    var top = el('stack').querySelector('.card.top');
    if (!top || animating) return;
    commit('impulse', top);
  });

  // ── Keyboard ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (el('arena').style.display === 'none') return;
    if (idx >= txns.length || animating) return;
    var top = el('stack').querySelector('.card.top');
    if (!top) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); commit('planned', top); }
    if (e.key === 'ArrowRight') { e.preventDefault(); commit('impulse', top); }
  });

  // ── Progress ──────────────────────────────────────────────────────────────
  function updateProgress() {
    var lbl = el('progressLabel');
    if (!lbl) return;
    var remaining = txns.length - idx;
    lbl.textContent = remaining > 0 ? (idx + 1) + ' of ' + txns.length : '';
  }

  // ── Completion ────────────────────────────────────────────────────────────
  function showDone() {
    el('arena').style.display     = 'none';
    el('actionBar').style.display = 'none';
    el('doneScreen').classList.add('visible');

    el('sTotal').textContent   = txns.length;
    el('sPlanned').textContent = stats.planned;
    el('sImpulse').textContent = stats.impulse;
    el('doneSub').textContent  =
      'You reviewed ' + txns.length + ' transaction' + (txns.length !== 1 ? 's' : '') + '.';

    // Signal to Money Dashboard
    localStorage.setItem('evening_swipe_done', 'true');
    localStorage.setItem('fl_evening_swipe_done', 'true');

    announce(
      'Done. ' + stats.planned + ' planned, ' + stats.impulse +
      ' impulse. Link to money dashboard available.'
    );
  }

  // ── Empty done button ─────────────────────────────────────────────────────
  el('btnEmptyDone').addEventListener('click', function() { window.location.href = '/money'; });

  // ── Back button ───────────────────────────────────────────────────────────
  el('backBtn').addEventListener('click', function() { window.history.back(); });

  // ── Start ─────────────────────────────────────────────────────────────────
  boot();

})();
</script>
</body>
</html>
