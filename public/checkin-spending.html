<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>Evening Check-In — FocusLedger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:      #011e5c;
            --orange:    #c9a84c;
            --orange-dk: #a8892e;
            --cream:     #faf9f7;
            --surface:   #fff;
            --text:      #1a1a1a;
            --muted:     #6b6b6b;
            --border:    #e8e5e0;
            --planned:   #22c55e;
            --planned-bg:#f0fdf4;
            --impulse:   #f59e0b;
            --impulse-bg:#fffbeb;
            --card-shadow: 0 8px 32px rgba(0,0,0,0.18);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: white;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

        /* ── App shell ── */
        .shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
            padding:
                env(safe-area-inset-top, 0)
                0
                calc(80px + env(safe-area-inset-bottom, 0));
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem 0.5rem;
            flex-shrink: 0;
        }
        .top-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: rgba(255,255,255,0.45);
        }
        .progress-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }
        .back-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.45);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.3rem 0;
            font-family: 'DM Sans', sans-serif;
        }
        .back-btn:hover { color: rgba(255,255,255,0.8); }

        /* ── Section headers ── */
        .section-header {
            padding: 0.25rem 1.25rem 0.5rem;
            flex-shrink: 0;
        }
        .section-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        /* ── Card arena ── */
        .arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.25rem;
            position: relative;
            overflow: hidden;
        }

        /* Stack container */
        .stack {
            position: relative;
            width: 100%;
            max-width: 340px;
            height: 180px;
        }

        /* ── Transaction card ── */
        .card {
            position: absolute;
            inset: 0;
            background: var(--surface);
            border-radius: 18px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            cursor: grab;
            will-change: transform;
            transition: box-shadow 0.15s;
            overflow: hidden;
        }
        @media (prefers-reduced-motion: no-preference) {
            .card {
                transition: box-shadow 0.15s, transform 0.2s ease, opacity 0.2s ease;
            }
        }
        .card:active { cursor: grabbing; }

        /* Background pill bands */
        .swipe-bg-planned {
            position: absolute;
            inset: 0;
            background: var(--planned-bg);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .swipe-bg-impulse {
            position: absolute;
            inset: 0;
            background: var(--impulse-bg);
            border-radius: 18px;
            display: flex;
            align-items: center;
            padding-left: 1.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .swipe-bg-label {
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.04em;
        }
        .swipe-bg-planned .swipe-bg-label { color: var(--planned); }
        .swipe-bg-impulse .swipe-bg-label { color: var(--impulse); }

        .card-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }
        .cat-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: rgba(1,30,92,0.07);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        .amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .merchant {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }
        .category {
            font-size: 0.82rem;
            color: var(--muted);
        }
        .timestamp {
            font-size: 0.78rem;
            color: var(--muted);
        }

        /* Swipe hints */
        .card-hints {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .hint-left, .hint-right {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0.4;
        }
        .hint-left { color: #22c55e; }
        .hint-right { color: #f59e0b; }

        /* Stagger-in animations */
        @media (prefers-reduced-motion: no-preference) {
            @keyframes fadeUp {
                from { opacity: 0; transform: translateY(10px); }
                to   { opacity: 1; transform: translateY(0); }
            }
            .stagger-1 { animation: fadeUp 0.3s ease both 0ms; }
            .stagger-2 { animation: fadeUp 0.3s ease both 50ms; }
            .stagger-3 { animation: fadeUp 0.3s ease both 100ms; }
            .stagger-4 { animation: fadeUp 0.3s ease both 150ms; }
            .stagger-5 { animation: fadeUp 0.3s ease both 200ms; }
        }

        /* Peek card */
        .card.peek {
            transform: translateY(14px) scale(0.93);
            z-index: 0;
            opacity: 0.7;
            pointer-events: none;
        }
        .card.top {
            z-index: 2;
            box-shadow: var(--card-shadow);
        }
        .card.hidden {
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* ── Empty state (no transactions today) ── */
        .no-tx-state {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            text-align: center;
            padding: 2rem 1rem;
        }
        .no-tx-state.visible { display: flex; }
        .empty-icon { font-size: 3rem; }
        .empty-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
        }
        .empty-sub { font-size: 0.9rem; color: rgba(255,255,255,0.5); line-height: 1.5; max-width: 280px; }
        .btn-empty-done {
            padding: 0.85rem 2rem;
            background: var(--orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-empty-done:hover { background: var(--orange-dk); }

        /* ── Swipe indicators ── */
        .swipe-indicator {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.15s;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .swipe-indicator.left { left: 0.25rem; color: var(--planned); }
        .swipe-indicator.right { right: 0.25rem; color: var(--impulse); }
        .swipe-indicator.active { opacity: 1; }
        .swipe-indicator span { font-size: 1.2rem; }

        /* ── Loading ── */
        #loadingScreen {
            display: flex;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.88rem;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.12);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Bottom action bar (fixed above bottom nav at 60px) ── */
        .action-bar {
            position: fixed;
            bottom: calc(60px + env(safe-area-inset-bottom, 0px));
            left: 0; right: 0;
            max-width: 500px;
            margin: 0 auto;
            padding: 0.75rem 1.25rem;
            display: flex;
            gap: 0.75rem;
            z-index: 50;
        }
        .btn {
            flex: 1;
            padding: 0.85rem 1rem;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .btn:active { transform: scale(0.97); }
        .btn-planned { background: #dcfce7; color: #16a34a; }
        .btn-impulse { background: #fef3c7; color: #d97706; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── Completion screen ── */
        #completionScreen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1.5rem;
            gap: 1.25rem;
        }
        #completionScreen.visible { display: flex; }
        .complete-icon { font-size: 3rem; }
        .complete-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .complete-sub {
            font-size: 0.92rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.55;
            max-width: 300px;
        }
        .stats-row {
            display: flex;
            gap: 1rem;
            margin: 0.25rem 0;
        }
        .stat-chip {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            min-width: 80px;
        }
        .stat-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .stat-lbl {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0.5;
        }
        .stat-chip.planned .stat-num { color: #4ade80; }
        .stat-chip.impulse .stat-num { color: #fbbf24; }
        .stat-chip.total .stat-num { color: white; }

        .done-btn {
            padding: 0.95rem 2rem;
            background: var(--orange);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.25rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .done-btn:hover { background: var(--orange-dk); }

        /* ── Keyboard hint ── */
        .kb-hint {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-top: 0.5rem;
        }

        /* ── Accessibility ── */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* ── Swipe animation keyframes (guarded) ── */
        @media (prefers-reduced-motion: no-preference) {
            @keyframes slideOffLeft {
                to { transform: translateX(-150%) rotate(-18deg); opacity: 0; }
            }
            @keyframes slideOffRight {
                to { transform: translateX(150%) rotate(18deg); opacity: 0; }
            }
            @keyframes riseUp {
                from { transform: translateY(14px) scale(0.93); opacity: 0.7; }
                to   { transform: translateY(0) scale(1); opacity: 1; }
            }
            .card.sliding-left {
                animation: slideOffLeft 0.38s var(--spring) forwards;
                pointer-events: none;
            }
            .card.sliding-right {
                animation: slideOffRight 0.38s var(--spring) forwards;
                pointer-events: none;
            }
            .card.rising {
                animation: riseUp 0.3s var(--spring) forwards;
            }
        }
    </style>
</head>
<body>

<div class="shell">

    <!-- Top bar -->
    <div class="top-bar">
        <button class="back-btn" id="backBtn" aria-label="Go back">← Back</button>
        <div style="display:flex;flex-direction:column;align-items:center;gap:0.15rem">
            <span class="top-brand">Evening Check-In</span>
            <span class="progress-label" id="progressLabel" aria-live="polite"></span>
        </div>
        <div style="width:50px;"></div>
    </div>

    <!-- Live region for screen reader announcements -->
    <div id="srAnnounce" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <!-- Loading -->
    <div id="loadingScreen" role="status" aria-label="Loading today's transactions">
        <div class="spinner"></div>
        <span>Loading today's transactions…</span>
    </div>

    <!-- Card arena (spending cards) -->
    <div class="arena" id="cardArena" style="display:none;">

        <!-- Section header -->
        <div class="section-header">
            <div class="section-title">Spending Review</div>
        </div>

        <!-- Stack of cards -->
        <div class="stack" id="cardStack" aria-label="Transaction cards — swipe left for planned, right for impulse" role="list">
            <!-- Swipe direction indicators -->
            <div class="swipe-indicator left" id="swipeLeftInd" aria-hidden="true">
                <span>←</span> Planned
            </div>
            <div class="swipe-indicator right" id="swipeRightInd" aria-hidden="true">
                Impulse <span>→</span>
            </div>
            <!-- Cards rendered by JS -->
        </div>

        <!-- Keyboard hint -->
        <div class="kb-hint" id="kbHint" aria-hidden="true">← → arrow keys · Enter to confirm</div>

        <!-- Empty state: no transactions today -->
        <div class="no-tx-state" id="noTxState" role="status">
            <div class="empty-icon" aria-hidden="true">🌙</div>
            <div class="empty-heading">All quiet today</div>
            <div class="empty-sub">No spending to review today — your finances are quiet.</div>
            <button class="btn-empty-done" id="btnEmptyDone" type="button">Done</button>
        </div>
    </div>

    <!-- Completion screen -->
    <div id="completionScreen" role="status">
        <div class="complete-icon" aria-hidden="true">✨</div>
        <div class="complete-heading">You're done for today.</div>
        <div class="complete-sub" id="completeSub">Here's what you logged today.</div>
        <div class="stats-row">
            <div class="stat-chip total">
                <div class="stat-num" id="statTotal">0</div>
                <div class="stat-lbl">Reviewed</div>
            </div>
            <div class="stat-chip planned">
                <div class="stat-num" id="statPlanned">0</div>
                <div class="stat-lbl">Planned</div>
            </div>
            <div class="stat-chip impulse">
                <div class="stat-num" id="statImpulse">0</div>
                <div class="stat-lbl">Impulse</div>
            </div>
        </div>
        <a href="/app/checkin/evening" class="done-btn" id="doneBtn">Full wrap-up →</a>
    </div>

</div>

<!-- Bottom action buttons (fixed, above nav) -->
<div class="action-bar" id="actionBar" style="display:none;">
    <button class="btn btn-planned" id="btnPlanned" type="button" aria-label="Mark as planned">
        ← Planned
    </button>
    <button class="btn btn-impulse" id="btnImpulse" type="button" aria-label="Mark as impulse">
        Impulse →
    </button>
</div>

<!-- Spring animation utility -->
<script src="/lib/spring.js"></script>
<!-- Haptics (no-op in browser, vibrate on mobile PWA) -->
<script src="/js/haptics.js"></script>
<script>
(function() {
    'use strict';

    // ── Auth gate ────────────────────────────────────────────────────────────
    var token = localStorage.getItem('fl_token');
    if (!token) { window.location.href = '/login'; return; }

    // ── State ───────────────────────────────────────────────────────────────
    var transactions   = [];       // unclassified transactions
    var currentIdx     = 0;
    var sessionId       = null;
    var classifications = {};
    var stats = { planned: 0, impulse: 0, total: 0 };
    var isAnimating = false;

    // ── API helpers ──────────────────────────────────────────────────────────
    function apiFetch(url, opts) {
        opts = opts || {};
        opts.headers = Object.assign(
            { Authorization: 'Bearer ' + token },
            opts.headers || {}
        );
        return fetch(url, opts);
    }

    function el(id) { return document.getElementById(id); }

    // ── Screen reader announcements ─────────────────────────────────────────
    function announce(msg) {
        var a = el('srAnnounce');
        a.textContent = '';
        void a.offsetWidth; // force reflow
        a.textContent = msg;
    }

    // ── Category icons ───────────────────────────────────────────────────────
    var CAT_EMOJI_MAP = {
        'food': '🍽️', 'restaurant': '🍽️', 'coffee': '☕', 'bar': '🍸',
        'travel': '✈️', 'airline': '✈️', 'hotel': '🏨',
        'transport': '🚗', 'uber': '🚗', 'lyft': '🚗', 'gas': '⛽',
        'grocery': '🛒', 'supermarket': '🛒',
        'shop': '🛍️', 'amazon': '📦', 'clothing': '👕',
        'entertainment': '🎬', 'movie': '🎬', 'music': '🎵', 'game': '🎮',
        'health': '💊', 'pharmacy': '💊', 'doctor': '🏥',
        'utility': '⚡', 'electric': '⚡', 'internet': '📡',
        'subscription': '📱', 'software': '📱',
    };

    function getCatEmoji(cat) {
        if (!cat) return '💳';
        var lower = cat.toLowerCase();
        for (var k in CAT_EMOJI_MAP) {
            if (lower.includes(k)) return CAT_EMOJI_MAP[k];
        }
        return '💳';
    }

    function formatAmount(cents) {
        if (cents == null) return '$0.00';
        return '$' + (cents / 100).toFixed(2);
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr.replace(' ', 'T'));
        if (isNaN(d)) return dateStr;
        return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    // ── Boot ────────────────────────────────────────────────────────────────
    function boot() {
        el('loadingScreen').style.display = '';
        el('cardArena').style.display = 'none';
        el('completionScreen').classList.remove('visible');
        el('actionBar').style.display = 'none';
        el('kbHint').style.display = 'none';

        apiFetch('/api/spending-sessions/today')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.success) throw new Error('API error');
                return data;
            })
            .then(function(data) {
                if (!data.session) {
                    return apiFetch('/api/spending-sessions/start', { method: 'POST' })
                        .then(function(r) { return r.json(); });
                }
                return data;
            })
            .then(function(data) {
                if (data.session_id) sessionId = data.session_id;
                transactions = (data.transactions || []).filter(function(t) {
                    return !classifications[t.id];
                });
                showArena();
            })
            .catch(function(err) {
                console.warn('[spending-checkin] boot error:', err);
                transactions = [];
                showArena();
            });
    }

    function showArena() {
        el('loadingScreen').style.display = 'none';
        el('cardArena').style.display = 'flex';

        if (transactions.length === 0) {
            el('noTxState').classList.add('visible');
            el('cardStack').style.display = 'none';
            el('actionBar').style.display = 'none';
            el('kbHint').style.display = 'none';
            announce('No transactions to review today.');
            return;
        }

        el('noTxState').classList.remove('visible');
        el('cardStack').style.display = '';
        el('actionBar').style.display = 'flex';
        el('kbHint').style.display = '';

        currentIdx = 0;
        renderStack();
        updateProgress();
    }

    // ── Render card stack ───────────────────────────────────────────────────
    function renderStack() {
        var stack = el('cardStack');
        stack.innerHTML = '';

        // Re-add swipe indicators
        var leftInd = document.createElement('div');
        leftInd.className = 'swipe-indicator left stagger-1';
        leftInd.id = 'swipeLeftInd';
        leftInd.setAttribute('aria-hidden', 'true');
        leftInd.innerHTML = '<span>←</span> Planned';
        stack.appendChild(leftInd);

        var rightInd = document.createElement('div');
        rightInd.className = 'swipe-indicator right stagger-1';
        rightInd.id = 'swipeRightInd';
        rightInd.setAttribute('aria-hidden', 'true');
        rightInd.innerHTML = 'Impulse <span>→</span>';
        stack.appendChild(rightInd);

        // Build peek + top + hidden cards
        var peekIdx = currentIdx + 1;
        var topIdx  = currentIdx;

        for (var i = peekIdx + 2; i >= topIdx; i--) {
            if (i >= transactions.length) continue;

            var t = transactions[i];
            var cardEl = buildCard(t, i);

            if (i === peekIdx) {
                cardEl.classList.add('peek');
            } else if (i === topIdx) {
                cardEl.classList.add('top');
                // Attach stagger classes
                cardEl.classList.add('stagger-2');
                attachSwipeHandlers(cardEl, t);

                // Screen reader announcement for top card
                var remaining = transactions.length - currentIdx;
                announce(
                    'Card ' + (currentIdx + 1) + ' of ' + transactions.length +
                    ': ' + (t.merchant_name || 'Unknown') + ', ' + formatAmount(t.amount) +
                    '. Swipe left for planned, right for impulse.'
                );
            } else {
                cardEl.classList.add('hidden');
                cardEl.classList.add('stagger-3');
            }

            stack.appendChild(cardEl);
        }
    }

    function buildCard(txn, idx) {
        var card = document.createElement('div');
        card.className = 'card';
        card.dataset.txnId = txn.id;
        card.dataset.idx   = idx;
        card.setAttribute('role', 'listitem');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label',
            (txn.merchant_name || 'Unknown') + ', ' + formatAmount(txn.amount)
        );

        var emoji    = getCatEmoji(txn.category);
        var catLabel = txn.category || 'Purchase';
        var timeStr  = formatTime(txn.date || txn.created_at);

        card.innerHTML =
            '<div class="swipe-bg-planned"><span class="swipe-bg-label">✓ Planned</span></div>' +
            '<div class="swipe-bg-impulse"><span class="swipe-bg-label">Impulse ✗</span></div>' +
            '<div class="card-inner">' +
                '<div class="card-top">' +
                    '<div class="cat-icon" aria-hidden="true">' + emoji + '</div>' +
                    '<div class="amount" aria-label="Amount">' + formatAmount(txn.amount) + '</div>' +
                '</div>' +
                '<div class="merchant stagger-2">' + escHtml(txn.merchant_name || 'Unknown merchant') + '</div>' +
                '<div class="category stagger-3">' + escHtml(catLabel) + ' &nbsp;·&nbsp; <span class="timestamp">' + escHtml(timeStr) + '</span></div>' +
                '<div class="card-hints stagger-4" aria-hidden="true">' +
                    '<span class="hint-left">← Planned</span>' +
                    '<span class="hint-right">Impulse →</span>' +
                '</div>' +
            '</div>';

        return card;
    }

    // ── Swipe physics ───────────────────────────────────────────────────────
    var SWIPE_THRESHOLD = 100;
    var touchOriginX = 0, touchOriginY = 0;
    var isDragging = false, dragDeltaX = 0, dragDeltaY = 0;

    function attachSwipeHandlers(card, txn) {
        card.addEventListener('touchstart', onTouchStart, { passive: true });
        card.addEventListener('touchmove',  onTouchMove,  { passive: false });
        card.addEventListener('touchend',   onTouchEnd,   { passive: false });

        // Also support mouse for desktop testing
        card.addEventListener('mousedown', function(e) {
            touchOriginX = e.clientX;
            touchOriginY = e.clientY;
            isDragging = true;
            dragDeltaX = 0; dragDeltaY = 0;
        });
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            dragDeltaX = e.clientX - touchOriginX;
            dragDeltaY = e.clientY - touchOriginY;
            if (Math.abs(dragDeltaX) > Math.abs(dragDeltaY) && Math.abs(dragDeltaX) > 8) {
                applyDragTransform(dragDeltaX);
            }
        });
        document.addEventListener('mouseup', function() {
            if (!isDragging) return;
            isDragging = false;
            var topCard = el('cardStack').querySelector('.card.top');
            if (!topCard) return;
            if (dragDeltaX < -SWIPE_THRESHOLD) {
                commitSwipe('planned', topCard);
            } else if (dragDeltaX > SWIPE_THRESHOLD) {
                commitSwipe('impulse', topCard);
            } else {
                applyDragTransform(0, true);
                resetIndicators();
            }
            dragDeltaX = 0; dragDeltaY = 0;
        });
    }

    function onTouchStart(e) {
        isDragging  = true;
        touchOriginX = e.touches[0].clientX;
        touchOriginY = e.touches[0].clientY;
        dragDeltaX  = 0;
        dragDeltaY  = 0;
    }

    function onTouchMove(e) {
        if (!isDragging) return;
        dragDeltaX = e.touches[0].clientX - touchOriginX;
        dragDeltaY = e.touches[0].clientY - touchOriginY;
        if (Math.abs(dragDeltaX) > Math.abs(dragDeltaY)) {
            e.preventDefault();
            applyDragTransform(dragDeltaX);
        }
    }

    function onTouchEnd(e) {
        if (!isDragging) return;
        isDragging = false;

        var topCard = el('cardStack').querySelector('.card.top');
        if (!topCard) return;

        if (dragDeltaX < -SWIPE_THRESHOLD) {
            commitSwipe('planned', topCard);
        } else if (dragDeltaX > SWIPE_THRESHOLD) {
            commitSwipe('impulse', topCard);
        } else {
            applyDragTransform(0, true);
            resetIndicators();
        }

        dragDeltaX = 0; dragDeltaY = 0;
    }

    function applyDragTransform(dx, snap) {
        var topCard = el('cardStack').querySelector('.card.top');
        if (!topCard) return;

        var rot = dx * 0.06;
        if (snap) {
            // Use spring easing from CSS variable (more bounce than linear)
            topCard.style.transition = 'transform 0.35s var(--spring)';
            topCard.style.transform  = '';
            // Also fire light haptic on snap-back (wasn't a valid swipe)
            if (window.FLHaptics) FLHaptics.light();
        } else {
            topCard.style.transition = '';
            topCard.style.transform  = 'translateX(' + dx + 'px) rotate(' + rot + 'deg)';
        }

        var bgPlanned = topCard.querySelector('.swipe-bg-planned');
        var bgImpulse  = topCard.querySelector('.swipe-bg-impulse');
        var leftInd    = el('swipeLeftInd');
        var rightInd   = el('swipeRightInd');

        var leftAmt  = Math.min(Math.abs(dx) / SWIPE_THRESHOLD, 1);
        var rightAmt = Math.min(Math.abs(dx) / SWIPE_THRESHOLD, 1);

        if (dx < 0) {
            if (bgPlanned) bgPlanned.style.opacity = leftAmt;
            if (bgImpulse) bgImpulse.style.opacity  = 0;
            if (leftInd) leftInd.classList.toggle('active', leftAmt > 0.3);
            if (rightInd) rightInd.classList.remove('active');
        } else {
            if (bgPlanned) bgPlanned.style.opacity = 0;
            if (bgImpulse) bgImpulse.style.opacity  = rightAmt;
            if (rightInd) rightInd.classList.toggle('active', rightAmt > 0.3);
            if (leftInd) leftInd.classList.remove('active');
        }
    }

    function resetIndicators() {
        var leftInd  = el('swipeLeftInd');
        var rightInd = el('swipeRightInd');
        if (leftInd)  leftInd.classList.remove('active');
        if (rightInd) rightInd.classList.remove('active');
        var topCard = el('cardStack').querySelector('.card.top');
        if (topCard) {
            var bgPlanned = topCard.querySelector('.swipe-bg-planned');
            var bgImpulse  = topCard.querySelector('.swipe-bg-impulse');
            if (bgPlanned) bgPlanned.style.opacity = 0;
            if (bgImpulse) bgImpulse.style.opacity  = 0;
        }
    }

    // ── Commit classification ───────────────────────────────────────────────
    function commitSwipe(classification, cardEl) {
        if (isAnimating) return;
        isAnimating = true;

        var txnId = cardEl.dataset.txnId;
        var dir   = classification === 'planned' ? 'left' : 'right';

        cardEl.classList.add(dir === 'left' ? 'sliding-left' : 'sliding-right');

        classifications[txnId] = classification;
        stats.total++;
        if (classification === 'planned') stats.planned++;
        else stats.impulse++;

        // Haptic feedback
        if (window.FLHaptics) FLHaptics.taskComplete();
        if (navigator.vibrate) navigator.vibrate(30);

        postClassification(txnId, classification);

        setTimeout(function() {
            currentIdx++;
            isAnimating = false;

            if (currentIdx >= transactions.length) {
                showCompletion();
            } else {
                updateProgress();
                renderStack();
            }
        }, 380);
    }

    function postClassification(txnId, classification) {
        if (!sessionId) return;
        apiFetch('/api/spending-sessions/' + sessionId + '/classify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transaction_id: txnId, classification: classification })
        }).catch(function(err) {
            console.warn('[spending-checkin] classify error:', err);
        });
    }

    // ── Button actions ───────────────────────────────────────────────────────
    el('btnPlanned').addEventListener('click', function() {
        var topCard = el('cardStack').querySelector('.card.top');
        if (!topCard || isAnimating) return;
        commitSwipe('planned', topCard);
    });

    el('btnImpulse').addEventListener('click', function() {
        var topCard = el('cardStack').querySelector('.card.top');
        if (!topCard || isAnimating) return;
        commitSwipe('impulse', topCard);
    });

    // ── Keyboard accessibility ─────────────────────────────────────────────
    document.addEventListener('keydown', function(e) {
        if (el('cardArena').style.display === 'none') return;
        if (currentIdx >= transactions.length) return;
        if (isAnimating) return;

        var topCard = el('cardStack').querySelector('.card.top');
        if (!topCard) return;

        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            commitSwipe('planned', topCard);
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            commitSwipe('impulse', topCard);
        } else if (e.key === 'Enter') {
            e.preventDefault();
            commitSwipe('planned', topCard);
        }
    });

    // ── Progress counter ─────────────────────────────────────────────────────
    function updateProgress() {
        var lbl = el('progressLabel');
        if (!lbl) return;
        var remaining = transactions.length - currentIdx;
        if (remaining > 0) {
            lbl.textContent = (currentIdx + 1) + ' of ' + transactions.length;
            lbl.style.display = '';
        } else {
            lbl.style.display = 'none';
        }
    }

    // ── Completion ───────────────────────────────────────────────────────────
    function showCompletion() {
        el('cardArena').style.display    = 'none';
        el('actionBar').style.display    = 'none';
        el('kbHint').style.display       = 'none';
        el('completionScreen').classList.add('visible');

        el('statTotal').textContent   = stats.total;
        el('statPlanned').textContent = stats.planned;
        el('statImpulse').textContent = stats.impulse;
        el('completeSub').textContent = 'You reviewed ' + stats.total + ' transaction' + (stats.total === 1 ? '' : 's') + '.';

        // Mark session complete
        if (sessionId) {
            apiFetch('/api/spending-sessions/' + sessionId + '/complete', {
                method: 'POST'
            }).catch(function() {});
        }

        // Set localStorage flag so Money Dashboard unlocks Card 4
        localStorage.setItem('evening_swipe_done', 'true');

        announce(
            'Session complete. ' + stats.planned + ' planned, ' + stats.impulse +
            ' impulse. ' + stats.total + ' transactions reviewed. Link to money dashboard available.'
        );

        if (window.FLHaptics) FLHaptics.checkinSubmit();
    }

    // ── Empty state: Done button ─────────────────────────────────────────────
    el('btnEmptyDone').addEventListener('click', function() {
        // Record evening check-in credit even when there's nothing to triage.
        apiFetch('/api/buddy/evening', { method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ money_tasks_done: 0 })
        }).catch(function() {}).finally(function() {
            window.location.href = '/app/buddy';
        });
    });

    // ── Back button ─────────────────────────────────────────────────────────
    el('backBtn').addEventListener('click', function() {
        window.history.back();
    });

    // ── Utility ─────────────────────────────────────────────────────────────
    function escHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    boot();

})();
</script>
</body>
</html>
