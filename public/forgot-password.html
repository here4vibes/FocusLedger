<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <link rel="icon" type="image/svg+xml" href="/icons/fl-icon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/fl-icon.png">
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name="color-scheme" content="light">
    <title>Forgot Password - FocusLedger</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap' rel='stylesheet'>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #011e5c;
            --orange: #c9a84c;
            --orange-light: #d4b56a;
            --cream: #faf9f7;
            --text-dark: #1a1a1a;
            --text-muted: #6b6b6b;
            --error: #E07A5F;
            --error-light: #FAEAE5;
            --success: #7DB87D;
            --success-light: #EAFAF0;
            --border: #e8e5e0;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

        .auth-nav {
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--orange);
            border-radius: 3px;
            transform: rotate(45deg);
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(45, 42, 38, 0.06);
            border: 1px solid #E8E5E0;
        }
        .auth-card h1 {
            font-size: 1.75rem;
            color: var(--navy);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #E8E5E0;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text-dark);
            background: white;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--orange-light);
        }
        .form-group input::placeholder {
            color: #B0ADA8;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }
        .btn-submit:hover { background: var(--orange-light); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .message-box {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.88rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        .message-box.visible { display: block; }
        .message-box.error {
            background: var(--error-light);
            color: var(--error);
        }
        .message-box.success {
            background: var(--success-light);
            color: #2E7D32;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--orange);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover { text-decoration: underline; }

        .page-footer {
            text-align: center;
            padding: 1.5rem;
        }
        .page-footer p { font-size: 0.82rem; color: var(--text-muted); }
        .page-footer a { color: var(--orange); text-decoration: none; }

        @media (max-width: 480px) {
            .auth-card { padding: 2rem 1.5rem; }
            .auth-nav { padding: 1rem 1.25rem; }
        }
    </style>
</head>
<body>

    <div class='auth-nav'>
        <a href='/' class='logo'>
            <div class='logo-dot'></div>
            FocusLedger
        </a>
    </div>

    <div class='auth-container'>
        <div class='auth-card'>
            <h1>Reset your password</h1>
            <p class='subtitle'>Enter your email and we'll send you a link to reset your password. It expires in 1 hour.</p>

            <div class='message-box' id='messageBox'></div>

            <form id='forgotForm'>
                <div class='form-group'>
                    <label for='email'>Email address</label>
                    <input type='email' id='email' placeholder='you@example.com' required autocomplete='email' autofocus>
                </div>
                <button type='submit' class='btn-submit' id='submitBtn'>Send reset link</button>
            </form>

            <div class='auth-footer'>
                Remember your password? <a href='/login'>Log in</a>
            </div>
        </div>
    </div>

    <div class='page-footer'>
        <p>FocusLedger &mdash; <a href='/terms'>Terms</a> &middot; <a href='/privacy'>Privacy</a></p>
    </div>

    <script>
    (function() {
        'use strict';

        var form = document.getElementById('forgotForm');
        var emailInput = document.getElementById('email');
        var submitBtn = document.getElementById('submitBtn');
        var messageBox = document.getElementById('messageBox');

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message-box visible ' + type;
        }

        function hideMessage() {
            messageBox.classList.remove('visible');
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            hideMessage();

            var email = emailInput.value.trim();
            if (!email) {
                showMessage('Please enter your email address.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    // Always show success — even if email wasn't found (no enumeration)
                    showMessage('Check your inbox — we sent a link if an account with that email exists.', 'success');
                    emailInput.value = '';
                    submitBtn.textContent = 'Sent!';
                    // Allow retry after a delay
                    setTimeout(function() {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Send another link';
                    }, 30000);
                } else {
                    showMessage(data.message || 'Something went wrong. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send reset link';
                }
            })
            .catch(function() {
                showMessage('Could not reach the server. Check your connection.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send reset link';
            });
        });
    })();
    </script>

    <!-- Analytics -->
    <script src='/js/analytics.js'></script>
    <script>if (typeof FLA !== 'undefined') { FLA.trackPage('forgot_password'); FLA.trackEvent('password_reset_requested'); }</script>
</body>
</html>
