<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/fl-icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/fl-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/fl-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FocusLedger – You're Offline</title>
    <link rel="manifest" href="/manifest.json">
    <!-- Meta Pixel base + PageView -->

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1597499061553078&ev=PageView&noscript=1"/></noscript>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #E8913A;
            --navy: #2D2A26;
            --navy-mid: #3D3A36;
            --cream: #FAF9F6;
            --text-muted: #6B6560;
        
            --success: #7DB87D;
            --warning: #E07A5F;
            --error: #E07A5F;
            --error-light: #FAEAE5;
            --border: #E8E5E0;
            --surface: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--cream);
            color: var(--navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            background: var(--navy);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .diamond {
            width: 32px;
            height: 32px;
            background: var(--orange);
            transform: rotate(45deg);
            border-radius: 4px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.75rem;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto 2rem;
        }

        .cached-notice {
            background: rgba(232, 145, 58, 0.08);
            border: 1px solid rgba(232, 145, 58, 0.2);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            font-size: 0.875rem;
            color: var(--navy);
            max-width: 320px;
            margin: 0 auto 2rem;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--orange);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            min-height: 48px;
            min-width: 48px;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { opacity: 0.8; }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #FF6B6B;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="icon-wrap">
        <div class="diamond"></div>
    </div>

    <!-- De Botton: calm possibility, not failure or absence. McLuhan: the offline state is neutral. -->
    <h1>You're offline <span class="status-dot"></span></h1>
    <p>No connection right now. Your tasks and spending are saved locally.</p>

    <div class="cached-notice">
        Everything you've captured is here. Reconnect whenever you're ready to sync.
    </div>

    <button class="btn" onclick="tryReconnect()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try Again
    </button>

    <div class="footer">FocusLedger — Tasks &amp; Money, Together</div>

    <script>
        function tryReconnect() {
            if (navigator.onLine) {
                window.location.href = '/app';
            } else {
                window.location.reload();
            }
        }

        // Auto-redirect when connection restored
        window.addEventListener('online', () => {
            setTimeout(() => { window.location.href = '/app'; }, 500);
        });
    </script>
</body>
</html>
