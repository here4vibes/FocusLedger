<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#011e5c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FocusLedger">
    <link rel="icon" type="image/svg+xml" href="/icons/fl-icon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/fl-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>Welcome — FocusLedger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #c9a84c;
            --navy: #011e5c;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: white;
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
            padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
        }

        /* Top bar — just the logo, no nav */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem 0.5rem;
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }
        .logo .focus { color: rgba(255,255,255,0.9); }
        .logo .ledger { color: var(--orange); }

        /* Chat area */
        #chatArea {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem 1.25rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg.buddy { justify-content: flex-start; }
        .msg.user  { justify-content: flex-end; }

        .bubble {
            max-width: 82%;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.45;
        }
        .msg.buddy .bubble {
            background: rgba(255,255,255,0.1);
            border-radius: 4px 18px 18px 18px;
            color: rgba(255,255,255,0.92);
        }
        .msg.user .bubble {
            background: var(--orange);
            border-radius: 18px 18px 4px 18px;
            color: #fff;
            font-weight: 500;
        }

        .buddy-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(201,168,76,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .typing-dots {
            display: flex; gap: 4px; align-items: center;
            padding: 0.65rem 0.85rem;
        }
        .typing-dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            animation: bounce 1.1s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Setting-up screen (after conversation completes) */
        #setupScreen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            text-align: center;
            padding: 2rem;
        }
        #setupScreen.visible { display: flex; }
        .setup-spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .setup-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: rgba(255,255,255,0.92);
        }
        .setup-sub {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.5);
        }

        /* Input wrap */
        .input-wrap {
            padding: 0.75rem 1rem;
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0));
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 0.6rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 0.5rem 0.6rem 0.5rem 1rem;
        }
        textarea#userInput {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            line-height: 1.45;
            resize: none;
            height: 24px;
            max-height: 120px;
            overflow-y: auto;
        }
        textarea#userInput::placeholder { color: rgba(255,255,255,0.35); }
        #sendBtn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--orange);
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }
        #sendBtn:disabled { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>
<div class="app-shell">

    <div class="top-bar">
        <div class="logo"><span class="focus">Focus</span><span class="ledger">Ledger</span></div>
    </div>

    <div id="chatArea"></div>

    <div id="setupScreen">
        <div class="setup-spinner"></div>
        <div class="setup-heading">Setting up your space…</div>
        <div class="setup-sub">This takes just a second.</div>
    </div>

    <div class="input-wrap" id="inputWrap">
        <div class="input-row">
            <textarea
                id="userInput"
                placeholder="Type here…"
                rows="1"
                maxlength="800"
                autocomplete="off"
                autocorrect="on"
                autocapitalize="sentences"
            ></textarea>
            <button id="sendBtn" type="button" aria-label="Send" disabled>➤</button>
        </div>
    </div>

</div>

<script src="/js/haptics.js"></script>
<script src="/shared-nav.js"></script>
<script>
(function () {
    'use strict';

    if (!localStorage.getItem('fl_token')) { window.location.href = '/login'; return; }

    var state = {
        history: [],   // [{role:'buddy'|'user', content:'...'}]
        sending: false,
        done: false,
    };

    var chatEl = document.getElementById('chatArea');
    var inputEl = document.getElementById('userInput');
    var sendBtn = document.getElementById('sendBtn');
    var inputWrap = document.getElementById('inputWrap');
    var setupScreen = document.getElementById('setupScreen');

    // Check if onboarding already done (returning users who hit this URL)
    apiFetch('/api/onboarding/status')
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.success && !data.needsOnboarding) {
                window.location.href = '/app/buddy';
                return;
            }
            startOnboarding();
        })
        .catch(function () { startOnboarding(); });

    function startOnboarding() {
        // Buddy opens the conversation — first message is hard-coded to avoid a round trip
        var opening = "Hey! I'm Buddy — your ADHD co-pilot in FocusLedger. Before I show you around, I want to understand what brought you here. What's one area of your life that feels the most out of control right now?";
        appendBuddyMessage(opening);
        state.history.push({ role: 'buddy', content: opening });
        enableInput();
    }

    function enableInput() {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        setTimeout(function () { inputEl.focus(); }, 100);
    }

    function disableInput() {
        sendBtn.disabled = true;
        inputEl.disabled = true;
    }

    function appendBuddyMessage(text) {
        var row = document.createElement('div');
        row.className = 'msg buddy';
        row.innerHTML = '<div class="buddy-avatar">💬</div><div class="bubble">' + escHtml(text) + '</div>';
        chatEl.appendChild(row);
        scrollChat();
    }

    function appendUserMessage(text) {
        var row = document.createElement('div');
        row.className = 'msg user';
        row.innerHTML = '<div class="bubble">' + escHtml(text) + '</div>';
        chatEl.appendChild(row);
        scrollChat();
    }

    function showTyping() {
        var row = document.createElement('div');
        row.className = 'msg buddy';
        row.id = 'typingIndicator';
        row.innerHTML = '<div class="buddy-avatar">💬</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
        chatEl.appendChild(row);
        scrollChat();
    }

    function hideTyping() {
        var t = document.getElementById('typingIndicator');
        if (t) t.remove();
    }

    function scrollChat() {
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function sendMessage() {
        if (state.sending || state.done) return;
        var text = inputEl.value.trim();
        if (!text) return;

        appendUserMessage(text);
        state.history.push({ role: 'user', content: text });
        inputEl.value = '';
        inputEl.style.height = 'auto';
        disableInput();
        state.sending = true;
        showTyping();

        apiFetch('/api/onboarding/conversation', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, history: state.history.slice(0, -1) })
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            hideTyping();
            state.sending = false;

            if (!data.success) {
                appendBuddyMessage("Sorry, something glitched. Try sending that again.");
                enableInput();
                return;
            }

            appendBuddyMessage(data.reply);
            state.history.push({ role: 'buddy', content: data.reply });

            if (data.isComplete) {
                state.done = true;
                completeOnboarding(data.seedPayload || {});
            } else {
                enableInput();
            }
        })
        .catch(function () {
            hideTyping();
            state.sending = false;
            appendBuddyMessage("Lost connection for a second. Try again.");
            enableInput();
        });
    }

    function completeOnboarding(seedPayload) {
        // Brief pause so the user reads Buddy's closing message, then show setup screen
        setTimeout(function () {
            chatEl.style.display = 'none';
            inputWrap.style.display = 'none';
            setupScreen.classList.add('visible');

            apiFetch('/api/onboarding/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tasks: seedPayload.tasks || [],
                    struggle_area: seedPayload.struggle_area || null,
                    peak_energy: seedPayload.peak_energy || null,
                    conversationHistory: state.history
                })
            })
            .then(function () {
                // Short pause so the spinner feels intentional, not instant
                setTimeout(function () {
                    window.location.href = '/app/buddy';
                }, 1200);
            })
            .catch(function () {
                setTimeout(function () {
                    window.location.href = '/app/buddy';
                }, 1200);
            });
        }, 1000);
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    inputEl.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
})();
</script>
</body>
</html>
