<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0c1b40"/>
<title>FocusLedger</title>
<style>
  :root{
    --ground:#eef1f8;--canvas:#f7f9fd;--surface:#ffffff;
    --ink:#0c1b40;--muted:#6b7896;--faint:#9aa6c2;
    --accent:#2f6df0;--accent-soft:#e7effd;
    --warm:#c98a2f;--warm-soft:#fbf1df;
    --line:#e4e9f4;--line-2:#d6ddec;
    --good:#2e9e6b;--good-soft:#e4f4ec;--alert:#c9552f;--alert-soft:#fbe9e2;
    --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:radial-gradient(120% 60% at 50% -10%,#fff 0%,var(--ground) 55%,#e7ebf5 100%);
    color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;}

  .top{display:flex;align-items:center;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + .6rem) 1.1rem .5rem;flex:none;}
  .brand{display:flex;align-items:center;gap:.5rem;}
  .brand .dot{width:26px;height:26px;border-radius:50%;background:#eaf0ff;overflow:hidden;
    display:grid;place-items:center;box-shadow:0 2px 8px rgba(12,27,64,.2),inset 0 0 0 1px rgba(47,109,240,.14);}
  .dot img{width:100%;height:100%;object-fit:contain;display:block;}
  .brand .name{font-weight:700;font-size:.94rem;letter-spacing:-.01em;}
  .brand .name small{display:block;font-size:.66rem;color:var(--faint);font-weight:600;letter-spacing:.02em;}
  .top-actions{display:flex;align-items:center;gap:.45rem;}
  .chiplink{font-size:.72rem;color:var(--muted);text-decoration:none;font-weight:600;
    border:1px solid var(--line-2);border-radius:999px;padding:.3rem .65rem;background:var(--surface);white-space:nowrap;}
  .chiplink:active{background:var(--accent-soft);}
  .chiplink.today{color:var(--accent);border-color:transparent;background:var(--accent-soft);}

  .thread{flex:1;overflow-y:auto;padding:.5rem 1rem 1rem;display:flex;flex-direction:column;gap:.72rem;
    scroll-behavior:smooth;max-width:640px;width:100%;margin:0 auto;}
  .thread::-webkit-scrollbar{width:0;}

  .b{display:flex;gap:.5rem;align-items:flex-start;opacity:0;transform:translateY(6px);animation:in .32s ease forwards;}
  @keyframes in{to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.b,.u,.card,.chips{animation:none;opacity:1;transform:none;}}
  .b .dot{flex:none;width:27px;height:27px;border-radius:50%;background:#eaf0ff;overflow:hidden;
    display:grid;place-items:center;box-shadow:0 2px 8px rgba(12,27,64,.2),inset 0 0 0 1px rgba(47,109,240,.14);}
  .b .msg{font-size:.95rem;line-height:1.46;color:var(--ink);padding-top:2px;max-width:85%;}
  .b .msg.soul{font-family:var(--serif);font-size:1.05rem;line-height:1.34;}
  .b .msg strong{font-weight:700;}
  .b .msg em{font-style:italic;color:var(--muted);}
  .b .msg .fade{color:var(--faint);}
  .u{align-self:flex-end;background:var(--accent);color:#fff;font-size:.93rem;padding:.5rem .82rem;
    border-radius:16px 16px 4px 16px;max-width:82%;box-shadow:0 3px 10px rgba(47,109,240,.28);line-height:1.4;
    opacity:0;transform:translateY(6px);animation:in .28s ease forwards;word-wrap:break-word;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:.85rem .9rem;
    box-shadow:0 8px 20px -12px rgba(12,27,64,.26);max-width:96%;
    opacity:0;transform:translateY(6px);animation:in .32s ease forwards;}
  .card .k{font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;font-weight:700;color:var(--accent);}
  .card .t{font-size:1rem;font-weight:650;margin:.15rem 0 .3rem;letter-spacing:-.01em;}
  .card .say{font-size:.9rem;color:var(--muted);line-height:1.45;}
  .tasklist{display:flex;flex-direction:column;gap:.1rem;margin-top:.25rem;}
  .tasklist .row{display:flex;align-items:center;gap:.55rem;padding:.28rem 0;border-top:1px solid var(--line);}
  .tasklist .row:first-child{border-top:none;}
  .tasklist .box{width:19px;height:19px;border-radius:6px;border:2px solid var(--line-2);flex:none;}
  .tasklist .lbl{font-size:.93rem;font-weight:600;}
  .tasklist .due{font-size:.72rem;color:var(--faint);margin-left:auto;flex:none;font-variant-numeric:tabular-nums;}
  .tasklist .due.over{color:var(--alert);}

  .mh{display:flex;justify-content:space-between;align-items:baseline;gap:.6rem;margin:.15rem 0 .5rem;}
  .mh .big{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .mh .split{font-size:.76rem;color:var(--muted);text-align:right;}
  .mh .split .imp{color:var(--alert);font-weight:600;}
  .catrow{display:flex;align-items:center;gap:.55rem;padding:.26rem 0;border-top:1px solid var(--line);}
  .catrow:first-of-type{border-top:none;}
  .catrow .ic{width:1.2rem;text-align:center;flex:none;}
  .catrow .cn{font-size:.88rem;font-weight:600;flex:none;min-width:5.5rem;}
  .catrow .track{flex:1;height:7px;background:var(--accent-soft);border-radius:4px;overflow:hidden;}
  .catrow .fill{height:100%;background:var(--accent);border-radius:4px;}
  .catrow .ca{font-size:.82rem;font-weight:700;font-variant-numeric:tabular-nums;flex:none;min-width:3.4rem;text-align:right;}

  .chips{display:flex;gap:.45rem;margin-top:.2rem;flex-wrap:wrap;opacity:0;animation:in .3s ease forwards;}
  .chip{font-size:.85rem;font-weight:600;padding:.48rem .8rem;border-radius:999px;cursor:pointer;border:none;
    font-family:inherit;transition:transform .1s ease;}
  .chip:active{transform:scale(.96);}
  .chip.solid{background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(47,109,240,.3);}
  .chip.ghost{background:var(--accent-soft);color:var(--accent);}
  .chip.good{background:var(--good-soft);color:var(--good);}
  .chip.warm{background:var(--warm-soft);color:var(--warm);}

  /* email confirmation card — reviewed + editable before anything sends */
  .card.confirm{border-color:var(--accent-soft);}
  .card .k.world{color:var(--accent);}
  .efield{display:flex;flex-direction:column;gap:.25rem;margin-top:.55rem;}
  .efield label{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--faint);}
  .efield .eto{font-size:.9rem;font-weight:600;color:var(--ink);}
  .efield input,.efield textarea{border:1px solid var(--line-2);border-radius:10px;padding:.5rem .6rem;
    font-family:inherit;font-size:.9rem;color:var(--ink);background:var(--canvas);width:100%;}
  .efield textarea{min-height:130px;resize:vertical;line-height:1.5;}
  .efield input:disabled,.efield textarea:disabled{opacity:.65;}
  .eactions{display:flex;align-items:center;gap:.5rem;margin-top:.75rem;flex-wrap:wrap;}
  .eactions .say{font-size:.84rem;color:var(--muted);}

  .note{align-self:flex-start;display:inline-flex;align-items:center;gap:.45rem;font-size:.76rem;
    color:var(--good);background:var(--good-soft);border-radius:999px;padding:.22rem .6rem .22rem .3rem;
    font-weight:600;opacity:0;animation:in .3s ease forwards;}
  .note.warm{color:var(--warm);background:var(--warm-soft);}
  .note.world{color:var(--accent);background:var(--accent-soft);}
  /* scope label — "App only" vs "Real world" so an in-app change is never
     confused with a real-world side effect (a sent email). */
  .note .scope{flex:none;font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;font-weight:800;
    border-radius:999px;padding:.16rem .45rem;background:rgba(46,158,107,.16);color:var(--good);}
  .note.world .scope{background:var(--accent);color:#fff;}
  .note.warm .scope{background:rgba(201,138,47,.2);color:var(--warm);}
  .note .undo{background:none;border:none;color:var(--accent);font-weight:700;cursor:pointer;
    font-size:.75rem;font-family:inherit;padding:0;text-decoration:underline;}
  .note .undo:disabled{color:var(--faint);cursor:default;text-decoration:none;}

  .typing{display:flex;gap:4px;padding:6px 2px;}
  .typing i{width:6px;height:6px;border-radius:50%;background:var(--faint);animation:blink 1.1s infinite;}
  .typing i:nth-child(2){animation-delay:.18s;}.typing i:nth-child(3){animation-delay:.36s;}
  @keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

  .dock{flex:none;border-top:1px solid var(--line);padding:.55rem .8rem calc(env(safe-area-inset-bottom) + .7rem);
    background:var(--canvas);}
  .dockinner{max-width:640px;margin:0 auto;}
  .suggest{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.5rem;scrollbar-width:none;}
  .suggest::-webkit-scrollbar{display:none;}
  .sg{flex:none;font-size:.79rem;color:var(--muted);background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:.36rem .72rem;cursor:pointer;white-space:nowrap;font-family:inherit;}
  .sg:active{background:var(--accent-soft);}
  .inputbar{display:flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--line-2);
    border-radius:999px;padding:.4rem .45rem .4rem .9rem;box-shadow:0 2px 8px rgba(12,27,64,.05);}
  .inputbar input{flex:1;border:none;outline:none;background:transparent;font-family:inherit;font-size:1rem;color:var(--ink);}
  .inputbar input::placeholder{color:var(--faint);}
  .inputbar .go{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:grid;
    place-items:center;font-size:.95rem;flex:none;border:none;cursor:pointer;}
  .inputbar .go:disabled{background:var(--line-2);cursor:default;}

  .loading{margin:auto;text-align:center;color:var(--faint);font-size:.85rem;}
</style>
</head>
<body>
  <div class="top">
    <div class="brand">
      <div class="dot"><img src="/icons/fl-icon.svg" alt="Buddy"></div>
      <div class="name">Buddy<small>FocusLedger</small></div>
    </div>
    <div class="top-actions">
      <a class="chiplink today" href="/app/today">Today</a>
      <a class="chiplink" href="/app">See modules</a>
    </div>
  </div>

  <div class="thread" id="thread">
    <div class="loading" id="loading">…</div>
  </div>

  <div class="dock">
    <div class="dockinner">
      <div class="suggest" id="suggest"></div>
      <div class="inputbar">
        <input id="input" placeholder="Tell Buddy anything…" autocomplete="off" enterkeyhint="send"/>
        <button class="go" id="go" aria-label="Send">↑</button>
      </div>
    </div>
  </div>

<script>
(function(){
  'use strict';
  var TOKEN = localStorage.getItem('fl_token');
  if(!TOKEN){ window.location.href = '/login?redirect=weightless'; return; }

  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var thread = document.getElementById('thread');
  var input  = document.getElementById('input');
  var go      = document.getElementById('go');
  var busy = false;
  // While Buddy is gathering info for an action (e.g. asked "what's their email?"),
  // keep the next message in the action flow instead of re-guessing intent.
  var pendingAct = false;

  // ── helpers ────────────────────────────────────────────────────────────────
  function scroll(){ thread.scrollTop = thread.scrollHeight; }
  function node(html){ var d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  // Buddy replies are lightly formatted (**bold**, *italic*, newlines). Escape first, then inline-format.
  function fmt(s){
    return esc(s)
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g,'<em>$1</em>')
      .replace(/\n/g,'<br>');
  }

  function user(text){ var n=node('<div class="u"></div>'); n.textContent=text; thread.appendChild(n); scroll(); }
  function buddy(html, soul){
    var n=node('<div class="b"><div class="dot"><img src="/icons/fl-icon.svg" alt="Buddy"></div><div class="msg'+(soul?' soul':'')+'"></div></div>');
    n.querySelector('.msg').innerHTML = html;
    thread.appendChild(n); scroll();
  }
  function raw(html){ var n=node(html); thread.appendChild(n); scroll(); return n; }
  function note(text, warm){ raw('<div class="note'+(warm?' warm':'')+'">'+esc(text)+'</div>'); }

  function chips(list){
    var wrap=document.createElement('div'); wrap.className='chips';
    list.forEach(function(c){
      var b=document.createElement('button'); b.className='chip '+(c.k||'ghost'); b.textContent=c.label;
      b.onclick=function(){ if(busy) return; wrap.remove(); send(c.send||c.label); };
      wrap.appendChild(b);
    });
    thread.appendChild(wrap); scroll(); return wrap;
  }

  function wait(ms){ return new Promise(function(r){ setTimeout(r, reduce?40:ms); }); }
  var _typingEl=null;
  function showTyping(){
    if(_typingEl) return;
    _typingEl=node('<div class="b"><div class="dot"><img src="/icons/fl-icon.svg" alt="Buddy"></div><div class="typing"><i></i><i></i><i></i></div></div>');
    thread.appendChild(_typingEl); scroll();
  }
  function hideTyping(){ if(_typingEl){ _typingEl.remove(); _typingEl=null; } }

  function api(path, opts){
    opts = opts || {};
    opts.headers = Object.assign({ 'Authorization':'Bearer '+TOKEN }, opts.headers||{});
    if(opts.body && typeof opts.body!=='string'){
      opts.headers['Content-Type']='application/json';
      opts.body=JSON.stringify(opts.body);
    }
    return fetch(path, opts).then(function(r){
      if(r.status===401){ window.location.href='/login?redirect=weightless'; throw new Error('unauthorized'); }
      return r.json();
    });
  }

  function setBusy(v){ busy=v; go.disabled=v; }

  // ── greeting from real /api/buddy/status ────────────────────────────────────
  function fmtDue(dueDate, today){
    if(!dueDate) return null;
    var d = String(dueDate).slice(0,10);
    if(d < today) return {label:'overdue', over:true};
    if(d === today) return {label:'today', over:false};
    return {label:new Date(d+'T12:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'}), over:false};
  }

  function greet(data){
    document.getElementById('loading').remove();
    var tasks = (data.tasks||[]);
    var done  = data.tasksCompletedToday||0;
    var slots = data.dailyPlanSlots||null;
    var deferred = (data.deferredItems||[]);
    var today = data.date;
    var hour = new Date().getHours();
    var partOfDay = hour<12?'Morning':hour<18?'Afternoon':'Evening';

    showTyping();
    wait(500).then(function(){
      hideTyping();

      // Resurface anything Buddy parked for later
      if(deferred.length){
        buddy(partOfDay+'. Before anything — you asked me to hold onto a few things. Still want them?', true);
        raw('<div class="card"><div class="k">You parked these</div><div class="tasklist">'+
          deferred.slice(0,4).map(function(x){
            return '<div class="row"><span class="box"></span><span class="lbl">'+esc(x.text)+'</span></div>';
          }).join('')+'</div></div>');
      }

      if(!tasks.length && !slots){
        // Deep-but-empty: invite a brain dump rather than showing a blank slate.
        buddy(partOfDay+'. Clean slate — nothing on your plate that I can see.', true);
        buddy("Want to empty your head at me? Just say everything that's rattling around and I'll sort it into what matters now, what can wait, and what you can let go of.");
        return;
      }

      var top = tasks.slice(0,3);
      var singular = top.length===1;
      buddy(partOfDay+', Sean.' + (done? ' '+done+' already done today — nice.' : '') +
        (singular ? ' Just one thing on your radar.' : ' Here\'s what\'s actually on your radar — not the whole pile.'), true);

      raw('<div class="card"><div class="k">'+(singular?'On your radar':'Your radar · '+top.length)+'</div><div class="tasklist">'+
        top.map(function(t){
          var due=fmtDue(t.due_date, today);
          return '<div class="row"><span class="box"></span><span class="lbl">'+esc(t.title)+'</span>'+
            (due?'<span class="due'+(due.over?' over':'')+'">'+due.label+'</span>':'')+'</div>';
        }).join('')+'</div></div>');

      buddy(singular ? 'Want to knock it out now, or should I hold it?'
                     : 'Where do you want to start? Or tell me what\'s actually going on.');
      chips(top.map(function(t){
        return { label:'Start: '+ (t.title.length>22?t.title.slice(0,22)+'…':t.title),
                 k:'ghost', send:"Let's start on: "+t.title };
      }).concat([{label:"I'm stuck", k:'warm', send:"I'm stuck"}]));
    });
  }

  // ── money: summon a real spending card ──────────────────────────────────────
  // The conversation endpoint has no expense context, so it would (correctly)
  // say it can't see transactions. Instead we answer money questions from the
  // real ledger — deterministic data, not a guess.
  function moneyIntent(t){
    return /\b(spend|spent|spending|budget|money|transactions?|expenses?|impulse|afford|purchases?)\b/i.test(t);
  }
  function periodFrom(t){
    if(/\bmonth\b/i.test(t)) return {p:'month', label:'this month'};
    if(/\b(year|ytd)\b/i.test(t)) return {p:'year', label:'this year'};
    if(/\btoday\b/i.test(t)) return {p:'day', label:'today'};
    return {p:'week', label:'this week'};
  }
  function money(text){
    pendingAct = false; // switching lanes to a money question
    user(text); input.value=''; setBusy(true); showTyping();
    var per = periodFrom(text);
    api('/api/expenses/summary?period='+per.p)
      .then(function(res){
        hideTyping();
        var s = res && res.summary;
        if(!res || !res.success || !s){
          buddy("I couldn't reach your spending just now — try again in a moment?");
          return;
        }
        if(!s.total){
          buddy(fmt("Nothing logged "+per.label+" yet, so there's nothing to show. Want to start tracking? Just tell me a purchase like *“spent $6 on coffee”* and I'll keep the ledger."), true);
          return;
        }
        var impPct = s.impulse_pct||0;
        var line = "You're at **$"+s.total.toFixed(2)+"** "+per.label+".";
        if(s.impulse_count>0)      line += " $"+s.impulse_total.toFixed(2)+" of it ("+impPct+"%) was impulse—"+(impPct>=40?"worth a glance":"not bad at all")+".";
        else if(s.total>0)          line += " All of it planned—that's real control.";
        buddy(fmt(line));

        var cats = (s.by_category||[]).filter(function(c){ return Number(c.total)>0; }).slice(0,4);
        var max = cats.reduce(function(m,c){ return Math.max(m, Number(c.total)); }, 0) || 1;
        var splitHtml = s.impulse_count>0
          ? '<span class="split"><span class="imp">$'+s.impulse_total.toFixed(0)+' impulse</span> · $'+s.planned_total.toFixed(0)+' planned</span>'
          : '<span class="split">all planned</span>';
        raw('<div class="card"><div class="k">Spending · '+esc(per.label)+'</div>'+
          '<div class="mh"><span class="big">$'+s.total.toFixed(2)+'</span>'+splitHtml+'</div>'+
          cats.map(function(c){
            var amt=Number(c.total), pct=Math.round(amt/max*100);
            return '<div class="catrow"><span class="ic">'+(c.category_icon||'💳')+'</span>'+
              '<span class="cn">'+esc(c.category_name||'Other')+'</span>'+
              '<span class="track"><span class="fill" style="width:'+pct+'%"></span></span>'+
              '<span class="ca">$'+amt.toFixed(0)+'</span></div>';
          }).join('')+'</div>');

        if(s.untriaged_count>0){
          note('💸 '+s.untriaged_count+' new charge'+(s.untriaged_count>1?'s':'')+' waiting to be sorted', true);
        }
      })
      .catch(function(err){
        hideTyping();
        if(err && err.message==='unauthorized') return;
        console.error('[weightless] money error:', err);
        buddy("Something hiccuped pulling your spending. Try again in a sec?");
      })
      .then(function(){ setBusy(false); input.focus(); });
  }

  // ── actions: let Buddy actually do things (reschedule / mark done) ───────────
  function actionIntent(t){
    return /\b(reschedule|resched|postpone|snooze|bump)\b/i.test(t)
        || /\b(move|push|shift)\b[\s\S]*\b(to|until|till|by|tomorrow|monday|tuesday|wednesday|thursday|friday|saturday|sunday|next)\b/i.test(t)
        || /\b(cross|check)\s*(it|that|them)?\s*off\b/i.test(t)
        || /\bmark(ed)?\b[\s\S]*\b(done|complete)/i.test(t)
        || /\b(done with|finished with)\b/i.test(t)
        || /\be-?mail\b/i.test(t)
        || /\b(send|write|draft)\b[\s\S]*\b(email|message|note|reply)\b/i.test(t)
        || /\breply to\b/i.test(t)
        || /\b(remind|nudge)\b/i.test(t)
        || /\badd (a |an )?(task|reminder|to-?do)\b/i.test(t);
  }

  function receipt(r){
    var world = r.ok && r.scope === 'world';
    var wrap = node('<div class="note'+(r.ok ? (world?' world':'') : ' warm')+'"></div>');
    // Leading scope chip: "App only" (nothing left FocusLedger) vs "Real world"
    // (a real side effect happened, e.g. an email was sent).
    var chip = document.createElement('span'); chip.className = 'scope';
    chip.textContent = r.ok ? (world ? 'Real world' : 'App only') : 'Not done';
    wrap.appendChild(chip);
    var span = document.createElement('span');
    span.textContent = (r.ok ? (world ? '📤 ' : '✓ ') : '· ') + r.summary;
    wrap.appendChild(span);
    if(r.ok && r.undoable && r.id){
      var u = document.createElement('button'); u.className='undo'; u.textContent='Undo';
      u.onclick = function(){
        u.disabled = true; u.textContent = '…';
        api('/api/agent/undo', { method:'POST', body:{ action_id:r.id } })
          .then(function(res){
            if(res && res.success){ span.textContent = '↩ ' + (res.summary||'Undone'); u.remove(); }
            else { u.disabled = false; u.textContent = 'Undo'; }
          })
          .catch(function(){ u.disabled = false; u.textContent = 'Undo'; });
      };
      wrap.appendChild(u);
    }
    thread.appendChild(wrap); scroll();
  }

  // Build conversation context from the visible thread so /act is stateful
  // without any server-side storage (user bubbles + Buddy messages, last 16).
  function threadHistory(){
    var out = [];
    thread.querySelectorAll('.u, .b .msg').forEach(function(el){
      var role = el.classList.contains('u') ? 'user' : 'assistant';
      var txt = (el.textContent || '').trim();
      if(txt) out.push({ role:role, content:txt });
    });
    return out.slice(-16);
  }

  function act(text){
    var history = threadHistory();
    user(text); input.value=''; setBusy(true); showTyping();
    api('/api/agent/act', { method:'POST', body:{ message:text, history:history } })
      .then(function(data){
        hideTyping();
        if(!data || !data.success){ pendingAct = false; buddy("I couldn't do that just now — mind trying again?"); return; }
        if(data.reply) buddy(fmt(data.reply), (data.reply||'').length < 140);
        (data.receipts||[]).forEach(receipt);
        if(data.confirmation) renderConfirm(data.confirmation);
        // Stay in the action flow only while Buddy is still asking for info.
        var acted = (data.receipts && data.receipts.length) || data.confirmation;
        pendingAct = !!(data.reply && !acted && /\?/.test(data.reply));
      })
      .catch(function(err){
        hideTyping();
        if(err && err.message==='unauthorized') return;
        console.error('[weightless] act error:', err);
        buddy("Something hiccuped taking that action. Try again in a sec?");
      })
      .then(function(){ setBusy(false); input.focus(); });
  }

  // ── real-world confirmation: draft an email, review/edit, then send ──────────
  function upsell(){
    buddy(fmt("I've got the whole email drafted for you — but **sending it on your behalf** is an Autopilot thing. Upgrade and I'll handle sends like this end to end."), true);
    raw('<a class="chiplink today" style="align-self:flex-start;text-decoration:none" href="/pricing">See Autopilot →</a>');
  }

  function renderConfirm(c){
    if(c.action_type !== 'draft_and_send_email') return; // only email in this stage
    var p = c.preview || {};
    var card = node('<div class="card confirm"></div>');
    card.innerHTML =
      '<div class="k world">Real world · your ok needed</div>'+
      '<div class="t">'+esc(c.title||'Send this email?')+'</div>'+
      '<div class="efield"><label>To</label><div class="eto"></div></div>'+
      '<div class="efield"><label>Subject</label><input class="esubj" type="text"></div>'+
      '<div class="efield"><label>Message</label><textarea class="ebody"></textarea></div>'+
      '<div class="eactions"></div>';
    card.querySelector('.eto').textContent = p.to || '';
    var subjEl = card.querySelector('.esubj'); subjEl.value = p.subject || '';
    var bodyEl = card.querySelector('.ebody'); bodyEl.value = p.body || '';
    var actions = card.querySelector('.eactions');
    var sent = false;

    function arm(){
      actions.innerHTML = '';
      var send = document.createElement('button'); send.className='chip solid'; send.textContent = c.confirmLabel||'Send it';
      var nope = document.createElement('button'); nope.className='chip ghost'; nope.textContent = c.cancelLabel||'Not yet';
      actions.appendChild(send); actions.appendChild(nope);
      nope.onclick = function(){
        if(sent) return; sent = true;
        api('/api/agent/confirm', { method:'POST', body:{ action_id:c.id, cancel:true } }).catch(function(){});
        card.remove();
        buddy("No rush — it's still just a draft. Say the word when you want it sent.");
      };
      send.onclick = function(){
        if(sent) return;
        subjEl.disabled = true; bodyEl.disabled = true;
        var secs = 5;
        actions.innerHTML = '';
        var msg = document.createElement('span'); msg.className='say';
        var stop = document.createElement('button'); stop.className='undo'; stop.textContent='Undo';
        actions.appendChild(msg); actions.appendChild(stop);
        var stopped = false;
        msg.textContent = 'Sending in ' + secs + '… ';
        var iv = setInterval(function(){
          if(stopped){ clearInterval(iv); return; }
          secs--;
          if(secs <= 0){
            clearInterval(iv); stop.remove(); msg.textContent = 'Sending… '; sent = true;
            api('/api/agent/confirm', { method:'POST', body:{ action_id:c.id, subject:subjEl.value, body:bodyEl.value } })
              .then(function(res){
                if(res && res.success && res.receipt){ card.remove(); receipt(res.receipt); }
                else if(res && res.upsell){ actions.innerHTML=''; upsell(); }
                else { card.remove(); buddy(res && res.message ? res.message : "That didn't go through — nothing was sent."); }
              })
              .catch(function(err){ if(err && err.message==='unauthorized') return; card.remove(); buddy("Something hiccuped sending that — nothing went out."); });
          } else { msg.textContent = 'Sending in ' + secs + '… '; }
        }, 1000);
        stop.onclick = function(){
          stopped = true; clearInterval(iv);
          api('/api/agent/confirm', { method:'POST', body:{ action_id:c.id, cancel:true } }).catch(function(){});
          card.remove();
          buddy("Held off — it's still just a draft. Ready when you are.");
        };
      };
    }
    arm();
    thread.appendChild(card); scroll();
  }

  // ── real conversation turn ──────────────────────────────────────────────────
  function send(text){
    text = (text||'').trim();
    if(busy || !text) return;
    if(moneyIntent(text)){ money(text); return; }
    if(actionIntent(text) || pendingAct){ act(text); return; }
    user(text);
    input.value='';
    setBusy(true);
    showTyping();

    api('/api/buddy/conversation', { method:'POST', body:{ message:text } })
      .then(function(data){
        hideTyping();
        if(!data || !data.success){
          buddy("I lost that one — mind saying it again?");
          return;
        }
        buddy(fmt(data.reply||''), (data.reply||'').length < 140);

        // Show the ledger actually moving — the proof this isn't just a chat.
        (data.autoCompleted||[]).forEach(function(t){ note('✓ Marked done: '+t.title); });
        (data.capturedTasks||[]).forEach(function(t){ note('＋ Added: '+(t.title||t)); });
        (data.capturedExpenses||[]).forEach(function(e){
          var amt = e.amount!=null ? '$'+Number(e.amount).toFixed(2) : '';
          note('💸 Logged '+amt+(e.note?(' · '+e.note):'')+' — impulse or planned?', true);
        });
      })
      .catch(function(err){
        hideTyping();
        if(err && err.message==='unauthorized') return;
        console.error('[weightless] conversation error:', err);
        buddy("Something hiccuped on my end. Try that again in a sec?");
      })
      .then(function(){ setBusy(false); input.focus(); });
  }

  // ── suggested prompts (route through the real conversation engine) ──────────
  var SUGGEST = [
    "What did I spend this week?",
    "I'm stuck",
    "Brain dump",
    "I'm done for today"
  ];
  var sg=document.getElementById('suggest');
  SUGGEST.forEach(function(s){
    var b=document.createElement('button'); b.className='sg'; b.textContent=s;
    b.onclick=function(){ if(busy) return; send(s); };
    sg.appendChild(b);
  });

  function submit(){ send(input.value); }
  go.onclick=submit;
  input.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); submit(); } });

  // Keep the whole app inside the *visible* viewport when the mobile keyboard
  // opens — otherwise 100dvh pushes the header (and "See modules") off-screen
  // and it can't be scrolled back while typing.
  if(window.visualViewport){
    var vv = window.visualViewport;
    var fit = function(){ document.body.style.height = vv.height + 'px'; scroll(); };
    vv.addEventListener('resize', fit);
    vv.addEventListener('scroll', fit);
  }

  // ── boot ────────────────────────────────────────────────────────────────────
  api('/api/buddy/status')
    .then(function(data){
      if(!data || !data.success){ throw new Error(data && data.message || 'status failed'); }
      greet(data);
    })
    .catch(function(err){
      if(err && err.message==='unauthorized') return;
      console.error('[weightless] status error:', err);
      var l=document.getElementById('loading'); if(l) l.remove();
      buddy("Hey — I'm having trouble reaching your day right now. Give me a moment, or tell me what you need.");
    });
})();
</script>
</body>
</html>
