  - type: cron
    name: rss-sync
    runtime: node
    schedule: "*/20 * * * *"
    buildCommand: npm install
    startCommand: node jobs/rss-sync.js

  - type: cron
    name: buddy-engagement
    runtime: node
    schedule: "0 * * * *"
    buildCommand: npm install
    startCommand: node jobs/buddy-engagement.js

  - type: cron
    name: plaid-daily-sync
    runtime: node
    schedule: "0 6 * * *"
    buildCommand: npm install
    startCommand: node jobs/plaid-sync.js

  - type: cron
    name: evening-checkin-sender
