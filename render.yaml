services:
  # ── Web service ──────────────────────────────────────────────────────────────
  # NOT declared here on purpose. The production web service predates this file
  # and is managed directly in the Render dashboard (settings: buildCommand
  # `npm install && npm test`, startCommand `npm start`, health check /health).
  # Declaring it here would make a Blueprint sync create a DUPLICATE web
  # service next to the real one. This file manages cron jobs only.

  # ── Cron jobs ─────────────────────────────────────────────────────────────────
  # Every cron declares `envVars: fromGroup: focusledger` — the shared Env Group
  # (DATABASE_URL, RESEND_API_KEY, VAPID/PLAID/APNS keys, ENCRYPTION_KEY, etc.).
  # With Blueprint sync this attaches automatically; on manually-created services
  # (this account's current state) link the "focusledger" group once in the
  # dashboard: service → Environment → Link environment group.

  - type: cron
    name: morning-nudge
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: node jobs/morning-nudge.js
    envVars:
      - fromGroup: focusledger

  - type: cron
    name: evening-nudge
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: node jobs/evening-nudge.js
    envVars:
      - fromGroup: focusledger

  - type: cron
