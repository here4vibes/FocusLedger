services:
  # ── Web service ──────────────────────────────────────────────────────────────
  - type: web
    runtime: node
    name: app
    buildCommand: npm install && npm run db:generate && npm test
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

  # ── Cron jobs ─────────────────────────────────────────────────────────────────
  # All cron jobs need the same env vars as the web service (DATABASE_URL,
  # RESEND_API_KEY, VAPID keys, PLAID keys, ENCRYPTION_KEY, APNS keys, etc.)
  # Set these via an Env Group in the Render dashboard and attach to each service,
  # or copy them individually from the web service's Environment tab.

  - type: cron
    name: morning-nudge
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: node jobs/morning-nudge.js

  - type: cron
    name: evening-nudge
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: node jobs/evening-nudge.js

  - type: cron
    name: task-deadline-nudge
    runtime: node
    schedule: "*/15 * * * *"
    buildCommand: npm install
    startCommand: node jobs/task-deadline-nudge.js

  - type: cron
    name: routine-nudge-check
    runtime: node
    schedule: "*/15 * * * *"
    buildCommand: npm install
    startCommand: node jobs/routineNudgeCheck.js

  - type: cron
    name: movement-break-check
    runtime: node
    schedule: "*/15 * * * *"
    buildCommand: npm install
    startCommand: node jobs/movementBreakCheck.js

  - type: cron
    name: impulse-spending-check
    runtime: node
    schedule: "*/15 * * * *"
    buildCommand: npm install
